body:
  text: 山海經卷十七晉郭璞撰大荒北經東北海之外大荒之中河水之間附禺之山帝顓頊與九嬪葬焉此皆殊俗義所作冡爰有􅀈久文貝離俞鸞鳥凰鳥大物小物言備有也有青鳥琅鳥𤣥鳥黄鳥虎豹熊羆黄蛇視肉璿瑰瑶碧皆出衛於山在其山邉也丘方圓三百里丘南帝俊竹林在焉大可為舟言舜林中竹一節則可以為船也竹南有赤澤水水色赤也名曰封淵封亦大也有三桑無枝皆髙百仭丘西有沉淵顓頊所浴有胡不與之國一國復名耳今胡夷語皆通然烈姓黍食大荒之中有山名曰不咸有肅愼氏之國今肅愼國去遼東三千餘里穴居無衣衣猪皮冬以膏塗體厚數分用却風寒其人皆工射􅃓長四尺勁强箭以楛為之長尺五寸青石為鏑此春秋時隼集陳侯之庭所得矢也晋大興三年平州刺史崔毖遣别駕髙㑹使來獻肅愼氏之􅃓矢箭鏃有似銅骨作者問云轉與海内國通得用此今名之為挹婁國出好貂赤玉豈從海外轉而至此乎後漢書所謂挹婁者是也有蜚蛭四翼翡窒両音有蟲獸首蛇身名曰琴蟲亦蛇𩔖也有人名曰大人有大人之國釐姓黍食有大青蛇黄頭食麈今南方蚺蛇食鹿鹿亦麈属也有榆山有鯀攻程州之山皆因其事而名物也大荒之中有山名曰衡天有先民之山有槃木千里音盤有叔歜國音作感反一音觸顓頊之子黍食使四鳥虎豹熊羆有黑蟲如熊狀名曰猎猎或作獡音夕同有北齊之國姜姓使虎豹熊羆大荒之中有山名曰先檻大逢之山河濟所入海北注焉河濟注海已復出海外入此山中也其西有山名曰禹所積石有陽山者有順山者順水出焉有始州之國有丹山此山純出丹朱也竹書曰和甲西征得一丹山今所在亦有丹山丹出土穴中有大澤方千里羣鳥所解穆天子傳曰北至廣原之野飛鳥所解其羽乃於此獵鳥獸絶羣載羽百車竹書亦曰穆王北征行流沙千里積羽千里皆謂此澤也有毛民之國其人面體皆生毛依姓食黍使四鳥禹生均國均國生役采采一作來役采生修鞈音如單祫之祫修鞈殺綽人人名帝念之潛為之國潛宻用之為國是此毛民有儋耳之國任姓其人耳大下儋垂在肩上朱崖儋耳鏤畫其耳亦以放之也禺號子食榖北海之渚中言在海島中種粟給食謂禺彊也有神人面鳥身珥兩青蛇踐兩赤蛇名曰禺彊大荒之中有山名曰北極天櫃音匱海水北注焉有神九首人面鳥身名曰九鳯又有神衘蛇操蛇其狀虎首人身四蹄長肘名曰彊良亦在畏獸畵中大荒之中有山名曰成都載天有人珥兩黄蛇把兩黄蛇名曰夸父后土生信信生夸父夸父不量力欲追日景逮之於禺谷禺淵日所入也今作虞將飲河而不足也將走大澤未至死于此渴死應龍已殺􅃖尤又殺夸父上云夸父不量力與日競而死今此復云為應龍所殺死無定名觸事而寄明其變化無方不可揆測乃去南方處之故南方多雨言龍水物以𩔖相感故也又有無膓之國是任姓為人長也無繼子食魚繼亦當作䏿謂膊膓也共工臣名曰相繇相栁也語聲轉耳九首蛇身自環言轉旋也食于九土言食殘也其所歍所尼歍嘔猶噴吒尼止也即為源澤言多氣力不辛乃苦言氣酷烈百獸莫能處言畏之也禹湮洪水殺相繇禹塞洪水由以溺殺之也其血腥臭不可生榖其地多水不可居也言其膏血滂流成淵水也禹湮之三仭三沮言禹以土塞之地䧟壊也乃以為池羣帝是因以為臺地下宜積土故衆帝因來在此共作臺在崑崙之北有岳之山㝷竹生焉㝷大竹名大荒之中有山名曰不句海水入焉有係昆之山者有共工之臺射者不敢北嚮言畏之也有人衣青衣名曰黄帝女魃音如旱魃之魃􅃖尤作兵伐黄帝黄帝乃令應龍攻之冀州之野冀州中土也黄帝亦教虎豹熊羆以與炎帝戰于阪泉之野而滅之見史記應龍畜水􅃖尤請風伯雨師縱大風雨黄帝乃下天女曰魃雨止遂殺􅃖尤魃不得復上所居不雨旱氣在也叔均言之帝後置之赤水之北遠徙之也叔均乃為田祖主田之官詩云田祖有神魃時亡之畏見逐也所欲逐之者令曰神北行向水位也先除水道决通溝瀆言逐之必得雨故見先除水道今之逐魃是也有人方食魚名曰深目民之國昐姓食魚亦胡𩔖但眼絶深黄帝時姓也有鍾山者有女子衣青衣名曰赤水女子獻神女也大荒之中有山名曰融父山順水入焉有人名曰犬戎黄帝生苖龍苖龍生融吾融吾生弄一作卞明弄明生白犬白犬有牝牡言自相配合也是為犬戎肉食有赤獸馬狀無首名曰戎宣王尸犬戎之神名也有山名曰齊州之山君山鬵山音朁鮮野山魚山有人一目當面中生一曰是威姓少昊之子食黍有繼無民繼無民任姓無骨子食氣魚言有無骨人也尸子曰徐偃王有筋無骨西北海外流沙之東有國曰中䡢顓頊之子食黍有國名曰頼丘有犬戎國有神人面獸身名曰犬戎西北海外黑水之北有人有翼名曰苖民三苖之民顓頊生驩頭驩頭生苖民苖民釐姓食肉有山名曰章山大荒之中有衡石山九隂山泂野之山上有赤𣗳青葉赤華名曰若木生崑崙西附西極其華光赤下照地有牛黎之國有人無骨儋耳之子儋耳乂生無骨子也西北海之外赤水之北有章尾山有神人面蛇身而赤身長千里直目正乘直目目從也正乘未聞其暝乃晦其視乃明言視為晝眠為夜也不食不寢不息風雨是謁言能請致風雨是燭九隂照九隂之幽𨼆也是謂燭龍離騷曰日安不到燭龍何燿詩含神霧曰天不足西北無有隂陽消息故有龍衘精以徃照天門中云淮南子曰蔽于委羽之山不見天日也山海經卷十七
