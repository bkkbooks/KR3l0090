  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0090_WYG_014-1a, image: WYG1042/WYG1042-0070a.png}
body:
  text: 山海經卷十四晉郭璞撰大荒東經東海之外大壑詩含神霧曰東注無底之谷謂此壑也離騷曰降望大壑少昊之國少昊金天氏帝摰之號也少昊孺帝顓頊於此孺義未詳棄其琴瑟言其壑中有琴瑟也有甘山者甘水出焉生甘淵水積則成淵也大荒東南隅有山名皮母地丘東海之外大荒之中有山名曰大言日月所出有波谷山者有大人之國晋永嘉二年有鷔鳥集于始安縣南廿里之鷔陂中民周虎張得之木矢貫之鐵鏃其長六尺有半以箭計之其射者人身應長一丈五六尺也又平州别駕髙㑹語云倭國人嘗行遭風吹度大海外見一國人皆長丈餘形狀似胡盖是長翟别種箭殆將從此國来也外傳曰焦僥人長三尺短之至也長者不過十丈數之極也按河圖玉版曰從崑崙以北九萬里得龍伯國人長三十丈生萬八千歳而死從崑崙以東得大秦人長十丈皆衣帛從此以東十萬里得佻人國長三十丈五尺從此以東十萬里得中秦國人長一丈穀梁傳曰長翟身横九畝載其頭眉見於軾即長數丈人也秦時大人見臨洮身長五丈脚跡六尺凖斯以言則此大人之長短未可得限度也有大人之市名曰大人之堂亦山名形狀如堂室耳大人時集㑹其上作市肆也有一大人踆其上張其兩耳踆或作俊皆古尊字莊子曰踆於㑹稽也有小人國名靖人詩含神霧曰東北極有人長九寸殆謂此小人也或作埩音同有神人面獸身名曰犁􅛗之尸音靈有潏山楊水出焉音如譎詐之譎有蒍國黍食言此國中惟有黍榖也蒍音口偽反使四鳥虎豹熊羆大荒之中有山名曰合虚日月所出有中容之國帝俊生中容俊亦舜字假借音也中容人食獸木實此國中有赤木𤣥木其華實美見吕氏春秋使四鳥豹虎熊羆有東口之山有君子之國其人衣冠帶劔亦使虎豹好謙譲也有司幽之國帝俊生晏龍晏龍生司幽司幽生思士不妻思女不夫言其人直思感而氣通無配合而生子此莊生所謂白鵠相視眸子不運而感風化之𩔖也食黍食獸是使四鳥有大阿之山者大荒中有山名曰眀星日月所出有白民之國帝俊生帝鴻帝鴻生白民白民銷姓黍食使四鳥虎豹熊羆又有乘黄獸乘之以致壽考也有青丘之國有狐九尾太平則出而為瑞也有柔僕民是維嬴土之國蠃猶沃衍也音盈有黑齒之國齒如漆也帝俊生黑齒聖人神化無方故其後世所降育多有殊𩔖異狀之人諸言生者多謂其苖裔未必是親所産姜姓黍食使四鳥有夏州之國有盖余之國有神人八首人面虎身十尾名曰天吳水伯大荒之中有山名曰鞠陵于天音菊東極離瞀三山名也音榖瞀日月所出名曰折丹神人東方曰折單吁之來風曰俊未詳来風所在也䖏東極以出入風言此人能節宣風氣時其出入東海之渚中音島有神人面鳥身珥兩黄蛇以蛇貫耳踐両黄蛇名曰禺䝞黄帝生禺􅝠禺􅝠生禺京即禺疆也禺京處北海禺􅝠處東海是惟海神言分治一海而為神也􅝠一本作號有招揺山融水出焉有國曰𤣥股自髀以下如漆黍食使四鳥有困民國勾姓而食有人曰王亥兩手操鳥方食其頭王亥託於有易河伯㒒牛河伯㒒牛皆人姓名託寄也見汲郡竹書有易殺王亥取㒒牛竹書曰殷王子亥賔于有易而滛焉有易之君綿臣殺而放之是故殷主甲微假師于河伯以代有易滅之遂殺其君綿臣也河念有易有易潛出為國於獸方食之名曰揺民言有易本與河伯友善上甲微殷之賢王假師以義伐罪故河伯不得不助滅之暨而哀念有易使得潛化而出化為揺民國帝舜生戲戲生揺民海内有兩人此乃有易所化者也名曰女丒即女丑之尸言其變化無常也然則一以渉化津而遯神域者亦無徃而不之觸感而寄迹矣范蠡之倫亦聞其風者也女丑有大􅈉廣千里也大荒之中有山名曰孽揺頵羝上有扶木柱三百里其葉如芥柱猶起高也葉似芥菜有谷曰温源谷温原即湯谷也湯谷上有扶木扶桑在上一日方至一日方出言交㑹相代也皆載于烏中有三足烏有神人面犬耳獸身珥兩青蛇名曰奢比尸有五彩之鳥相鄉棄沙未聞沙義惟帝俊下友亦未聞也帝下兩壇彩鳥是司言山下有舜二壇五彩鳥主之大荒之中有山名曰猗天蘓門日月所生有壎民之國音如諠譁之諠有綦山音忌又有揺山有䰝山音如釡甑之甑又有門戸山又有盛山又有待山有五彩之鳥東荒之中有山名曰壑明俊疾日月所出有中容之國東北海外又有三青馬三騅馬蒼白雜毛為騅甘華爰有遺玉三青鳥三騅視肉聚肉有眼甘華甘柤百榖所在言自生也有女和月母之國有人名曰􅂒音婉北方曰􅂒來之風曰􅀈言亦有両名也音剡是處東極隅以止日月使無相間出没司其短長言􅂒主察日月出入不令得相間錯如景之長短大荒東北隅中有山名曰凶犁土丘應龍處南極應龍龍有翼者也殺􅃖尤與夸父􅃖尤作兵者不得復上應龍遂住地下故下數旱上無復作雨者故也旱而為應龍之狀乃得大雨今之土龍本此氣應自然𡨕感非人所能為也東北中有流波山入海七千里其上有獸狀如牛蒼身而無角一足出入水則必風雨其光如日月其聲如雷其名曰䕫黄帝得之以其皮為鼓橛以雷獸之骨雷獸即雷神也人面龍身鼓其腹者橛猶擊也聲聞五百里以威天下山海經卷十四
