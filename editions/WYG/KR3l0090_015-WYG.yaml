body:
  text: 山海經卷十五晉郭璞撰大荒南經南海之外赤水之西流沙之東赤水出崑崙山流沙出鍾山也有獸左右有首名曰䟣踼出􅀈名國黜惕兩音有三青獸相并名曰雙雙言體合為一也公羊傳所云雙雙而俱至者盖謂此也有阿山者南海之中有汜天之山赤水窮焉流極於此山也赤水之東有蒼梧之野舜與叔均之所塟也叔均商均也舜廵狩死於蒼梧而塟之商圴因留死亦塟焉基今在九疑之中爰有文貝即紫貝也離俞即離朱􅀈久即鵂鶹也鷹賈賈亦鷹属委維即委蛇也熊羆𧰼虎豹狼視肉有滎山滎水出焉黑水之南有𤣥蛇食麈今南山蚺蛇蚕鹿亦此𩔖有巫山者西有黄鳥帝藥八齋天地神仙藥在此也黄鳥於巫山司此𤣥蛇言主之也大荒之中有不庭之山滎水窮焉有人三身帝俊妻娥皇生此三身之國葢後裔所出也姚姓黍食使四鳥姚舜姓也有淵四方四隅皆逹言淵四角皆旁通也北屬黑水南屬大荒屬猶連也北旁名曰少和之淵南旁名曰從淵音驄馬之驄舜之所浴也言舜嘗在此中澡浴也又有成山甘水窮焉甘水出甘山極此中也有季禺之國顓頊之子食黍言此國人顓頊之裔子也有羽民之國其民皆生毛羽有卵民之國其民皆生卵即卵生也大荒之中有不姜之山黑水窮焉黑水出崑崙山又有賈山汔水出焉又有言山又有登備之山即登葆山羣巫所從上下者也有恝恝之山音如券契之契又有蒲山澧音禮水出焉又有隗山音如隗囂之隗其西有丹其東有玉又南有山漂水出焉音票有尾山有翠山言此山有翠烏也有盈民之國於姓黍食又有人方食木葉有不死之國阿姓甘木是食甘木即不死𣗳食之不老大荒之中有山名曰去痓南極果北不成去痓果音如風痓之痓未詳南海渚中有神人面珥兩青蛇踐兩赤蛇曰不廷胡余神名耳有神名曰因因乎南方曰因乎夸風曰乎民亦有二名處南極以出入風有襄山又有重隂之山有人食獸曰季釐帝俊生季釐故曰季釐之國有緡淵音昬少昊生倍伐倍伐降處緡淵有水四方名曰俊壇水狀似土壇因名舜壇也有臷民之國為人黄色帝舜生無淫降臷處是謂巫臷民巫臷民朌姓食榖不績不經服也言自然有布帛也不稼不穡食也言五榖自生也種之為稼收之為穡爰有歌舞之鳥鸞鳥自歌鳯鳥自舞爰有百獸相羣爰處百榖所聚大荒之中有山名曰融天海水南入焉有人曰鑿齒羿殺之射殺之也有蜮山者有蜮民之國音惑桑姓食黍射蜮是食蜮短狐也似鼈􅅤沙射人中之則病死此山出之亦以名云有人方扜􅃓射黄蛇扜挽也音紆名曰蜮人有宋山者有赤蛇名曰育蛇有木生山上名曰楓木楓木􅃖尤所棄其桎梏􅃖尤為黄帝所得械而殺之已摘棄其械化而為𣗳也是謂楓木即今楓香𣗳有人方齒虎尾名曰祖狀之尸音如柤梨之柤有小人名曰焦僥之國皆長三尺幾姓嘉榖是食大荒之中有山名㱙塗之山音朽青水窮焉青水出崑崙有雲雨之山有木名曰欒禹攻雲雨攻謂槎伐其林木有赤石焉生欒言山有精靈復變生此木於赤石之上黄木赤枝青葉羣帝焉取藥言𣗳花實皆為神藥有國曰顓頊生伯服食黍有鼬姓之國音如橘柚之柚有苕山又有宗山又有姓山又有壑山又有陳州山又有東州山又有白水山白水出焉而生白淵昆吾之師所浴也昆吾古王者號音義曰昆吾山名谿水内出善金二文有異莫知所辨測有人名曰張𢎞在海上捕魚海中有張𢎞之國或曰即竒肱人疑非食魚使四鳥有人焉鳥喙有翼方捕魚於海大荒之中有人名曰驩頭鯀妻士敬士敬子曰炎融生驩頭驩頭人面鳥喙有翼食海中魚杖翼而行翅不可以飛倚杖之用行而已惟宜芑苣穋楊是食管子說地所宜云其種穋䄫黒黍皆禾𩔖也苣黒黍今字作禾旁起秬虬三音有驩頭之國帝堯帝嚳帝舜𦵏於岳山即秋山也爰有文貝離俞􅀈久鷹賈延維視肉熊羆虎豹朱木赤枝青華𤣥實有申山者大荒之中有山名曰天臺高山海水入焉東南海之外甘水之間有羲和之國有女子名曰羲和方日浴於甘淵羲和盖天地始生主日月者也故啟筮曰空桑之蒼蒼八極之既張乃有夫羲和是主日月職出入以為晦明又曰瞻彼上天一明一晦有夫羲和之子出於暘谷故堯因此而立羲和之官以主四時其後世遂為此國作日月之𧰼而掌之沐浴運轉之於甘水中以効其出入𤾉谷虞淵也所謂世不失職耳羲和者帝俊之妻生十日言生十子各以日名名之故言生十日數十也有盖猶之山者其上有甘柤枝幹皆赤黄葉白華黒實東又有甘華枝幹皆赤黄葉有青馬有赤馬名曰三騅有視肉有小人名曰菌人音如朝菌之菌有南𩔖之山爰有遺玉青馬三騅視肉甘華百穀所在山海經卷十五
