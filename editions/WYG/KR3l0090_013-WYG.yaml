body:
  text: 山海經卷十三晉郭璞撰海内東經海内東北陬以南者鉅燕在東北陬國在流沙中者埻端璽㬇埻音墩㬇音㬇或作繭㬉在崑崙虚東南一曰海内之郡不為郡縣在流沙中國在流沙外者大夏大夏國城方二三百里分為數十國地和温宜五榖竪沙居繇月支之國月支國多好馬美果有大尾羊如驢尾即羬羊也小月支天竺國皆附庸云繇音遥西胡白玉山在大夏東蒼梧在白玉山西南皆在流沙西崑崙虚東南崑崙山在西胡西皆在西北地理志崑崙山在臨羗西又有西王母祠也雷澤中有雷神龍身而人頭鼓其腹在吳西今城陽有堯冡靈臺雷澤在北也河圖曰大迹在雷澤華胥􅂂之而生伏羲都州在海中一曰郁州今在東海昫縣界世傳此山自蒼梧從南徙來上皆有南方物也郁音欝琅琊臺在渤海間琅琊之東今琅琊在海邊有山嶣堯特起狀如髙臺此即琅琊臺也琅琊者越王勾踐入霸中國之所都其北有山一曰在海間韓鴈在海中都州南始鳩在海中轅厲南國名或曰鳥名也㑹稽在大楚南岷三江首大江出汶山今江出汶山郡升遷縣岷山東南經蜀郡犍為至江陽東北經巴東建平宜都南郡江夏弋陽安豐至廬江南界東北經淮南下邳至廣陵郡入海北江出曼山南江出高山髙山在城都西入海在長州南浙江出三天子都在其東按地理志浙江出新安黟縣南蠻中東入海今錢塘浙江是也黟即歙也浙音折在閩西北入海餘暨南餘暨縣屬㑹稽今為永興縣廬江出三天子都入江彭澤西彭澤今彭蠡也在尋陽彭澤縣一曰天子鄣淮水出餘山餘山在朝陽東義鄉西入海淮浦北今淮水出義陽平氏縣桐栢山山東北經汝南汝隂淮南譙國下邳至廣陵縣入海朝陽縣今属新野湘水出舜𦵏東南陬西環之環繞也今湘水出零陵之營道縣陽湖山入于江入洞庭下洞庭地穴也在長沙巴陵今吴縣南大湖中有包山下有洞庭穴道潛行水底云無所不通號為地脉一曰東南西澤漢水出鮒魚之山書曰􅡙冡導漾東流為漢按水經漢水出武都沮縣東狼谷經漢中魏興至南鄉東經㐮陽至江夏安陸縣入江别為沔水又為滄浪之水帝顓頊𦵏于陽九嬪𦵏于隂四蛇衛之言有四蛇衛守山下濛水出漢陽西入江聶陽西漢陽縣屬朱提温水出崆峒山在臨汾南入河華陽北今温水在京兆隂盤縣水常温也臨汾縣属平陽潁水出少室少室山在雍氏南入淮西鄢北今潁水出河南陽城縣乾山東南經潁川汝隂至淮南下蔡入淮鄢今鄢陵縣属潁川一曰緱氏縣属河南音鈎汝水出天息山在梁勉鄉西南入淮極西北今汝水出南陽晋陽縣大孟山東北至河南梁縣東南經襄城潁川汝南至汝隂褒信縣入淮淮極地名一曰淮在期思北期思縣属弋陽涇水出長城北山山在郁致長垣北皆縣名也郅音桎北入渭戲北今涇水出安定朝縣西笄頭山東南經新平扶風至京兆高陵縣入渭戯地名今新豐縣也渭水出鳥䑕同穴山東注河入華隂北鳥鼠同穴山今在隴西首陽縣渭水出其東經南安天水畧陽扶風始平京兆𢎞農華隂縣入河白水出蜀而東南注江色㣲白濁今在梓潼白水縣源從臨洮之西西傾山来經沓中東流通隂平至漢夀縣入潛入江州城下江州縣属巴郡沅水山出𧰼郡鐔城西象郡今日南也鐔城縣今属武陵音尋入東注江入下雋西下雋縣今属長沙音昨䆒反合洞庭中水經曰沅水出牂牁且蘭縣又東北至鐔城縣為沅水又東過臨沅縣南又東至長沙下雋縣贑水出聶都東山今贑水出南康南野縣西北音感東北注江入彭澤西泗水出吳東北而南西南過湖陵西而東南注東海入淮隂北今泗水出魯國下縣西南至髙平胡陸縣東南經沛國彭城下邳至臨淮下相縣入淮鬱水出𧰼郡而西南注南海入須陵東南肄水出臨晉西南音如肄習之肄而東南注海入番隅西番禺縣属南海越之城下也潢水出桂陽西北山東南注肄水入敦浦西洛水出洛西山東北注河入成臯之西書云道洛自熊耳按水經洛水今出上洛冢嶺山東北經𢎞農至河南鞏縣入河成臯縣亦属河南也汾水出上窳北音愈而西南注河入皮氏南今汾水出太原晋陽故汾陽縣東南經晋陽西南經西河平陽至河東汾隂入河皮氏縣属平陽沁水出井陘山東東南注河入懷東南懷縣属河内河内北有井陘山濟水出共山南東丘共與㳟同絶鉅鹿澤絶猶截度也鉅鹿今在髙平注渤海入齊琅槐東北今濟水自滎陽卷縣東經陳留至潛隂北東北至髙平東北經濟南至樂安博昌縣入海今碣石也諸水所出又與水經違錯以為凡山川或有同名而異實或同實而異名或一實而數名似是而非似非而是且歴代久逺古今變易語有楚夏名號不同未得詳也潦水出衛臯東出塞外衛臯山𤣥菟髙句驪縣有潦山小潦水所出西河注大潦音遼東南注渤海入潦陽潦陽縣屬潦東虖沲水出晉陽城南而西至陽曲北而東注渤海經河間樂城東北注渤海也晋陽陽曲縣皆属太原入越章武北章武郡名漳水出山陽東東注渤海入章武南新城汴隂縣亦有漳水山海經卷十三
