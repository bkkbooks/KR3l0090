body:
  text: 山海經卷八晋郭璞撰海外北經海外自東北陬至西北陬者無䏿之國音啓或作綮在長股東為人無䏿䏿肥膓也其人穴居食土無男女死即埋之其心不朽死百廿歳乃復更生鍾山之神名曰燭隂燭龍也是燭九隂因名云視為晝暝為夜吹為冬呼為夏不飲不食不息息為風息氣息也身長千里在無䏿之東其為物人面蛇身赤色居鍾山下淮南子曰龍身一足一目國在其東一目中其面而居一曰有手足柔利國在一目東為人一手一足反膝曲足居上一脚一手反卷曲也一云畱利之國人足反折共工之臣曰相桞氏共工覇九州者九首以食於九山頭各自食一山之物言貪曓難饜相桞之所抵厥為澤谿抵觸厥掘也音撅禹殺相桞其血腥不可以𣗳五穀種禹厥之三仭三沮掘塞之而土三沮陷言其血膏浸潤壊也乃以為衆帝之臺言地潤濕唯可積土以為臺觀在崑崙之北此崑崙山在海外者柔利之東相桞者九首人靣蛇身而青不敢北射畏共工之臺臺在其東臺四方隅有一蛇虎色首衝南方衝猶向也深目國在其東為人舉一手一目一作日在共工臺東無腸之國在深目東一作南其為人長而無腸為人長大腹内無腸所食之物直通過聶耳之國在無腸國東使兩文虎為人兩手聶其耳言耳長行則以手攝持之也音諾頰反縣居海水中縣猶邑也及水所出入竒物言盡規有之兩虎在其東夸父與日逐走入日言及日于將入也逐音胄渴欲得飲飲於河渭河渭不足北飲大澤未至道渴而死弃其杖化為鄧林夸父者盖神人之名也其能及日景而傾河渭豈以走飲哉寄用于走飲耳幾乎不疾而速不行而至者矣此以一體為萬殊存亡代謝寄鄧林而逰形惡得尋其靈化哉博父國在聶耳東其為人大右手操青蛇左手操黄蛇鄧林在其東二𣗳木一曰博父禹所積石之山在其東河水所入河出崑崙而潛行地下至葱嶺復出注鹽澤從鹽澤復行南出於此山而為中國河遂注海也書曰導河積石言時有壅塞故導利以通之拘纓之國在其東一手把纓言其人常以一手持冠纓也或曰纓宜作癭一曰利纓之國尋木長千里在拘纓南生河上西北跂踵國􅉥音企在拘纓東其為人大兩足亦大其人行脚跟不著地也孝經鈎命訣曰焦僥跂踵重譯欵塞也一曰大踵歐絲之野在大踵東一女子跪據𣗳歐絲言噉桑而吐絲盖蚕𩔖也三桑無枝在歐絲東其木長百仭無枝言皆長百仭也范陵方三百里在三桑東洲環其下洲水中可居者環繞也務隅之山帝顓頊𦵏於陽顓頊號為髙陽冡今在濮陽故帝丘也一曰頓丘縣城門外廣陽里中九嬪𦵏於隂嬪婦一曰爰有熊羆文虎離朱􅀈久視肉平丘在三桑東爰有遺玉遺玉玉石青鳥視肉楊柳甘柤其𣗳枝幹皆赤黄華白葉黒實吕氏春秋曰其山之東有甘柤焉音如柤梨之柤甘華亦赤枝幹黄華百果所生在兩山夾上谷二大丘居中名曰平丘北海内有獸其狀如馬名曰騊駼陶塗兩音見爾雅有獸焉其名曰駮狀如白馬鋸牙食虎豹周書曰義渠兹白兹白若白馬鋸牙食虎豹按此二説與爾雅同有素獸焉狀如馬名曰蛩蛩即蛩蛩鉅虚也一走百里見穆天子傳音卭有青獸焉狀如虎名曰羅羅北方禺彊人面鳥身珥兩青蛇踐兩青蛇字𤣥􅁳水神也莊周曰禺彊立於北極一曰禺京一本云北方禺彊黒身手足乘兩龍山海經卷八
