body:
  text: 山海經卷五晉郭璞撰中山經中山經薄山之首曰甘棗之山共水出焉音恭而西流注于河其上多杻木其下有草焉葵本而杏葉或作楛葉黄華而莢實名曰籜他落反可以已瞢音盲有獸焉其狀如􅶧鼠而文題􅶧䑕所未詳音虺字亦或作虺其名曰㔮音那或作熊也食之已癭又東二十里曰歴兒之山其上多橿多櫔木音厲是木也方莖而員葉黄華而毛其實如揀揀木名子如指頭白而粘可以浣衣也音練或作簡服之不忘又東十五里曰渠豬之山其上多竹渠豬之水出焉而南流注于河其中是多豪魚狀如鮪鮪似鱣也赤喙尾赤羽可以已白癬又東三十五里曰葱聾之山其中多大谷是多白堊黑青黄堊言有雜色堊也又東十五里曰涹山音倭其上多赤銅其隂多鐵又東七十里曰脱扈之山有草焉其狀如葵葉而赤華莢實實如㯶莢今㯶木莢似皂莢也名曰植楮可以已癙癙病也淮南子曰狸頭已癙也食之不眯又東二十里曰金星之山多天嬰其狀如龍骨可以已痤癰痤也又東七十里曰泰威之山其中有谷曰梟谷其中多鐵或無谷字又東十五里曰橿谷之山其中多赤銅或作檀谷之山又東百二十里曰吳林之山其中多葌草亦菅字又北三十里曰牛首之山今長安西南有牛首山上有館下有水未知此是非有草焉名曰鬼草其葉如葵而赤莖其秀如禾服之不憂勞水出焉而西流注于潏水音如譎詐之譎是多飛魚其狀如鮒魚食之已痔衕又北四十里曰霍山今平陽永安縣廬江􅈞縣晉安羅江縣河南鞏縣皆有霍山明山以霍為名者非一矣按爾雅大山統小山為霍其水多榖有獸焉其狀如狸而白尾有鬛名曰朏朏養之可以已憂謂蓄養之也普昧反又北五十二里曰合谷之山是多薝棘未詳音瞻又北三十五里曰隂山亦曰險山多礪石文石礪石石中磨者少水出焉其中多彫棠其葉如榆葉而方其實如赤菽菽豆食之已聾又東北四百里曰鼓鐙之山多赤銅有草焉名曰榮草其葉如柳其本如雞卵食之已風凡薄山之首自甘棗之山至于鼓鐙之山凡十五山六千六百七十里歴兒冡也其祠禮毛太牢之具縣以吉玉縣祭山之名也見爾雅其餘十三山者毛用一羊縣嬰用桑封瘞而不糈桑封者桑主也方其下而鋭其上而中穿之加金言作神主而祭以金銀飾之也公羊傳曰虞主用桑主或作玉中次二經濟山之首曰煇諸之山其上多桑其獸多閭麋其鳥多鶡似雉而大青色有毛勇健鬭死乃止音曷出上黨也又西南二百里曰發視之山其上多金玉其下多砥礪即魚之水出焉而西流注于伊水又西三百里曰豪山其上多金玉而無草木又西三百里曰鮮山多金玉無草木鮮水出焉而北流注于伊水其中多鳴蛇其狀如蛇而四翼其音如磬見則其邑大旱又西三百里曰陽山多石無草木陽水出焉而北流注于伊水其中多化蛇其狀如人面而豺身鳥翼而蛇行其音如叱呼見則其邑大水又西二百里曰昆吾之山其上多赤銅此山出名銅色赤如火以之作刀切玉如割泥也周穆王時西戎獻之尸子所謂昆吾之劍也越絶書曰赤堇之山破而出錫若邪之谷涸而出銅歐冶子因以為純鉤之劍汲郡冡中得銅劍一枝長三尺五寸乃今所名為干將劒汲郡亦皆非鐵也明古者通以錫雜銅為兵器也有獸焉其狀如彘而有角其音如號如人號哭名曰蠪蚳上已有此獸疑同名食之不眯又西百二十里曰葌音間山葌水出焉而北流注于伊水其上多金玉其下多青雄黄有木焉其狀如棠而赤葉名曰􅉭草音忘可以毒魚又西一百五十里曰獨蘇之山上無草木而多水又西二百里曰蔓渠之山其上多金玉其下多竹箭伊水出焉而東流注于洛今伊水出上洛盧氏縣熊耳山東北至河南洛陽縣入洛有獸焉其名曰馬腹其狀如人面虎身其音如嬰兒是食人凡濟山經之首自煇諸之山至于蔓渠之山凡九山一千六百七十里其神皆人面而鳥身祠用毛擇用毛色用一吉玉投而不糈中次三經萯山之首曰敖岸之山或作獻萯音倍其陽多㻬琈之玉其隂多赭黄金神熏池居之是常出美玉或作石北望河林其狀如蒨如舉説者云蒨舉皆木名也未詳蒨音倩有獸焉其狀如白鹿而四角名曰夫諸見則其邑大水又東十里曰青要之山實維帝之密都天帝曲密之邑北望河曲河千里一曲一直也是多駕鳥未詳也或曰駕宜為鴐鴐鵞也音加南望墠渚水中小洲名渚墠音填禹父之所化鯀化於羽淵為黄熊今復云在此然則一已有變怪之性者亦無往而不化也是多僕纍蒲盧僕纍蝸牛也爾雅曰蒲盧者螟蛉也䰠武羅司之武羅神名䰠即神字其狀人面而豹文小腰而白齒或作首而穿耳以鐻鐻金銀器之名未詳也音渠其鳴如鳴玉如人鳴玉佩聲是山也宜女子畛水出焉音軫而北流注于河其中有鳥焉名曰鴢音如窈窕之窈其狀如鳬青身而朱目赤尾食之宜子朱淺赤也有草焉其狀如葌菅似茅也而方莖黄華赤實其本如藁本根似藁本亦香草名曰荀草或曰苞草服之美人色令人更美艷又東十里曰騩山音巍其上有美棗其隂有㻬琈之玉正回之水出焉而北流注于河其中多飛魚其狀如豚而赤文服之不畏雷可以禦兵又東四十里曰宜蘇之山其上多金玉其下多蔓居之木未詳滽滽之水出焉音容而北流注于河是多黄貝又東二十里曰和山其上無草木而多瑶碧實惟河之九都九水所㦧故曰九都是山也五曲曲回五重九水出焉合而北流注于河其中多蒼玉吉神泰逢司之吉猶善也其狀如人而虎尾或作雀尾是好居于萯山之陽出入有光太逢神動天地氣也言其有靈爽能興雲雨也夏后孔甲田於萯山之下天大風晦冥孔甲迷惑入于民室見吕氏春秋也凡萯山之首自敖岸之山至于和山凡五山四百四十里其祠太逢熏池武羅皆一牡羊副副謂破羊骨磔之以祭也見周禮音悃愊之愊嬰用吉玉其二神用一雄鷄瘞之糈用稌中次四經釐山之首音狸曰鹿蹄之山其上多玉其下多金甘水出焉而北流注于洛其中多泠石泠石未聞也泠或作涂西五十里曰扶豬之山其上多礝石音耎今鴈門山中出礝石白者如水水中有赤色者有獸焉其狀如貉而人目貉或作􅀈古字其名曰䴦音銀或作麋虢水出焉而北流注于洛其中多瓀石言亦出水中又西一百二十里曰釐山其陽多玉其隂多蒐音捜茅蒐今之蒨草也有獸焉其狀如牛蒼身其音如嬰兒是食人其名曰犀渠滽滽之水出焉而南流注于伊水有獸焉名曰􅀈音蒼頡之頡其狀如獳犬而有鱗其毛如彘鬛生鱗間也又西二百里曰箕尾之山多榖多涂石其上多㻬琈之玉又西二百五十里曰柄山其上多玉其下多銅滔雕之水出焉而北流注于洛其中多羬羊有木焉其狀如樗其葉如桐而莢實其名曰苃可以毒魚苃一作艾又西二百里曰白邊之山其上多金玉其下多青雄黄又西二百里曰熊耳之山今在上洛縣南其上多漆其下多㯶浮濠之水出焉而西流注于洛其中多水玉多人魚有草焉其狀如蘇而赤華名曰葶􅀢亭寧耵聹二音可以毒魚又西三百里曰牡山其上多文石其下多竹箭竹䉋其獸多㸲牛羬羊鳥多赤鷩音閉即鷩雉也又西三百五十里曰灌舉之山雒水出焉而東北流注于𤣥扈之水其中多馬腸之物此二山者洛間也洛水今出上洛縣冢嶺山河圗曰𤣥扈洛汭謂此間也凡釐山之首自鹿蹄之山至于𤣥扈之山凡九山千六百七十里其神狀皆人面獸身其祠之毛用一白雞祈而不糈言直祈禱以彩衣之以彩飾雞中次五經薄山之首曰茍牀之山或作茍林山無草木多怪石怪石似玉也書曰􅉢松怪石也東三百里曰首山其陰多穀柞草多􅙥芫􅙥山薊也芫華中藥其陽多㻬琈之玉木多槐其陰有谷曰机谷多􅠯鳥音如鉗􅎂之􅎂其狀如梟而三目有耳其音如錄食之已墊未聞又東三百里曰縣斸之山音如斤斸之斸無草木多文石又東二百里曰葱聾之山無草木多􅻑石未詳東北五百里曰條谷之山其木多槐桐其草多芍藥􅚂冬本草經曰􅚂冬一名滿冬今作門俗作耳又北十里曰超山其陰多蒼玉其陽有井冬有水而夏竭又東五百里曰成矦之山其上多櫄木似樗樹材中車轅吳人呼櫄音輴車或曰輶車其草多芃又東五百里曰朝歌之山谷多美堊又東五百里曰槐山谷多金錫又東十里曰歴山其木多槐其陽多玉又東十里曰尸山多蒼玉其獸多麖似鹿而小黑色尸水出焉南流注于洛水其中多美玉又東十里曰良餘之山其上多榖柞無石餘水出于其陰而北流注于河乳水出于其陽而東南流注于洛又東南十里曰蠱尾之山多礪石赤銅龍餘之水出焉而東南流注于洛又東北二十里曰升山其木多榖柞棘其草多藷藇􅈍蕙香草也多冦脫冦脫草生南方髙丈許似荷葉而莖中有瓤正白零桂人植而日灌之以為樹也黄酸之水出焉而北流注于河其中多璇玉石次玊者也孫卿曰璇玉瑶􅀈不知佩璇音旋又東十二里曰陽虛之山多金臨于𤣥扈之水河圗曰蒼頡為帝南巡狩登陽虚之山臨于𤣥扈洛汭靈龜負書丹甲青文以授之出此水中也凡薄山之首自茍林之山至于陽虚之山凡十六山二千九百二十八里升山冢也其祠禮太牢嬰用吉玉首山䰠也其祠用稌黑犧太牢之具蘖釀以蘖作醴酒也干儛干儛萬儛干楯也置鼓擊之以儛嬰用一璧尸水合天也天神之所馮也肥牲祠之用一黑犬于上用一雌雞于下刉一牝羊獻血以血祭也刉猶刲也周禮曰刉咡奉犬牲嬰用吉玉彩之又加以繒彩之飾也饗之勸強之也特牲饋食禮曰執奠祝饗是也中次六經縞羝山之首曰平逢之山南望伊洛東望榖城之山在濟北榖城縣西黄石公石在此山下張良取以合塟爾無草木無水多沙石有神焉其狀如人而二首名曰驕蟲是為螫蟲為螫蟲之長實惟蜂蜜之廬言羣蜂之所舎集蜜赤蜂名其祠之用一雄雞禳而勿殺禳亦祭名謂禳却惡氣也西十里曰縞羝之山無草木多金玉又西十里曰廆山音如瓌偉之瓌其陰多㻬琈之玉其西有谷焉名曰雚谷其木多柳楮其中有鳥焉狀如山雞而長尾赤如丹火而青喙名曰鴒䳩鈴要二音其鳴自呼服之不眯交觴之水出于其陽而南流注于洛俞隨之水出于其陰而北流注于榖水又西三十里曰瞻諸之山其陽多金其陰多文石㴬水出焉音謝而東南流注于洛少水出其陰而東流注于榖水世謂之慈澗又西三十里曰婁涿之山無草木多金玉瞻水出于其陽而東流注于洛陂水出于其陰世謂之百答水而北流注于榖水其中多茈石文石又西四十里曰白石之山惠水出于其陽而南流注于洛其中多水玉澗水出于其陰書曰伊洛􅈆澗西北流注于榖水其中多麋石櫨丹皆未聞又西五十里曰榖山其上多榖其下多桑爽水出焉世謂之紵麻澗而西北流注于榖水其中多碧緑又西七十二里曰密山今滎陽密縣亦有密山疑非也其陽多玉其陰多鐵豪水出焉而南流注于洛其中多旋龜其狀鳥首而鼈尾其音如判木無草木又西百里曰長石之山無草木多金玉其西有谷焉名曰共谷多竹共水出焉西南流注于洛其中多鳴石晉永康元年襄陽郡上鳴石似玉色青撞之聲聞七八里今零陵泉陵縣永正鄉有鳴石二所其一狀如鼓俗因名為石鼔即此𩔖也又西一百四十里曰傅山無草木多瑶碧厭染之水出于其陽而南流注于洛其中多人魚其西有林焉名曰墦冢音番穀水出焉而東流注于洛今榖水出榖陽谷東北至榖城縣入洛河其中多珚玉未聞也珚音堙又西五十里曰橐山其木多樗多􅚰木今蜀中有􅚰木七八月中吐穗穗成如有鹽粉著狀可以酢羮音備其陽多金玉其陰多鐵多蕭蕭蒿見爾雅橐水出焉而北流注于河其中多脩辟之魚狀如黽黽蛙屬也而白喙其音如䲭食之已白癬又西九十里曰常烝之山無草木多堊潐水出焉音譙而東北流注于河其中多蒼玉蓄水出焉而北流注于河又西九十里曰夸父之山其木多㯶柟多竹箭其獸多㸲牛羬羊其鳥多鷩其陽多玉其陰多鐵其北有林焉名曰桃林是廣員三百里其中多馬桃林今𢎞農湖縣闕鄉南谷中是也饒野馬山羊山牛也湖水出焉而北流注于河其中多珚玉又西九十里曰陽華之山其陽多金玉其陰多青雄黄其草多藷藇多苦辛其狀如橚即楸字也其實如𤓰其味酸甘食之已􅒻楊水出焉而西南流注于洛其中多人魚門水出焉而東北流注于河其中多𤣥䃤黒砥石生水中􅀈姑之水出于其陰􅀈音藉而東流注于門水其上多銅門水出于河七百九十里入雒水凡縞羝山之首自平逢之山至于陽華之山凡十四山七百九十里嶽在其中以六月祭之六月亦嵗之中如諸嶽之祠法則天下安寧中次七經苦山之首曰休與之山與或作輿下同其上有石焉名曰帝臺之棋帝臺神人名棋謂博棋也五色而文其狀如鶉卵帝臺之石所以禱百神者也禱祀百神則用此石服之不蠱有草焉其狀如蓍赤葉而本叢生名曰夙條可以為簳中箭笴也東三百里曰鼔鍾之山帝臺之所以觴百神也舉觴燕㑹則於此山因名為鼔鍾也有草焉方莖而黄華員葉而三成葉三重也其名曰焉酸可以為毒為治其上多礪其下多砥又東二百里曰姑媱之山音遥或無之山字帝女死焉其名曰女尸化為䔄草其葉胥成言葉相重也亦音遥其華黄其實如菟丘菟丘菟絲也見爾雅服之媚於人為人所愛也傳曰人服媚之如是一名荒夫草又東二十里曰苦山有獸焉名曰山膏其狀如逐即豚字赤若丹火善詈好罵人其上有木焉名曰黄棘黄華而員葉其實如蘭服之不字字生也易曰女子貞不字有草焉員葉而無莖赤華而不實名曰無條服之不癭又東二十七里曰堵山神天愚居之是多怪風雨其上有木焉名曰天楄音鞭方莖而葵狀服者不㖶食不噎也又東五十二里曰放臯之山放或作効又作牧明水出焉南流注于伊水其中多蒼玉有木焉其葉如槐黄華而不實其名曰蒙木服之不惑有獸焉其狀如蜂枝尾而反舌善呼好呼喚也其名曰文文又東五十七里曰大􅟣之山多㻬琈之玉多麋玉未詳有草焉其狀葉如榆方莖而蒼傷其名曰牛傷猶言牛棘其根蒼文服者不厥厥逆氣病可以禦兵其陽狂水出焉西南流注于伊水其中多三足龜今吳興陽羨縣有君山山上有池水中有三足六眼龜龞龜三足者名賁出爾雅食者無大疾可以已腫又東七十里曰半石之山其上有草焉生而秀其髙丈餘赤葉赤華華而不實初生先作穗却著葉花生穗間其名曰嘉榮服之者不霆不畏雷霆霹􅆮也音廷搏之廷來需之水出於其陽而西流注于伊水其中多鯩魚音倫黑文其狀如鮒食者不睡合水出于其陰而北流注于洛多鰧魚音騰狀如鱖居逵鱖魚大口大目細鱗有斑彩逵水中之冗道交通者鱖音劌蒼文赤尾食者不癰可以為瘻瘻癰屬也中多有虫淮南子曰雞頭已瘻音漏又東五十里曰少室之山今在河南陽城西俗名泰室百草木成囷未詳其上有木焉其名曰帝休葉狀如楊其枝五衢言樹枝交錯相重五出有𧰼衢路也離騷曰靡萍九衢黄華黑實服者不怒其上多玉此山巔亦有白玉膏得服之即得仙道世人不能上也詩含神霧云其下多鐵休水出焉而北流注于洛其中多䱱魚狀如􅉦蜼未詳􅉦音侜而長距足白而對未詳食者無蠱疾可以禦兵又東三十里曰泰室之山即中嶽嵩髙山也今在陽城縣西其上有木焉葉狀如梨而赤理其名曰栯木音郁服者不妬有草焉其狀如􅙥􅙥似薊也白華黑實澤如蘡薁言子滑澤其名曰䔄草服之不昧上多美石次玉者也啓母化為石而生啓在此山見淮南子又北三十里曰講山其上多玉多柘多栢有木焉名曰帝屋葉狀如椒反傷赤實反傷刺下勾也可以禦凶又北三十里曰嬰梁之山上多蒼玉錞于𤣥石言蒼玉依黑石而生也或曰錞于樂器名形似椎頭又東三十里曰浮戲之山有木焉葉狀如樗而赤實名曰亢木食之不蠱氾水出焉而北流注于河其東有谷因名曰蛇谷言此中出蛇故以名之上多少辛細辛也又東四十里曰少陘之山有草焉名曰􅞒草音剛葉狀如葵而赤莖白華實如蘡薁食之不愚言益人智器難之水出焉或作囂而北流注于役水一作侵又東南十里曰太山别有東小太山今在朱虚縣汶水所出疑此非也有草焉名曰梨其葉狀如荻荻亦蒿也音狄而赤華可以已疽太水出于其陽而東南流注于没水承水出于其陰而東北流注于没世謂之靖澗水又東二十里曰末山上多赤金末水出焉北流注于没水經作沬又東二十五里曰役山上多白金多鐵役水出焉北注于河又東三十五里曰敏山上有木焉其狀如荆白華而赤實名曰葪音計栢服者不寒令人耐寒其陽多㻬琈之玉又東三十里曰大騩之山今滎陽密縣有大騩山騩因溝水所出音歸其陰多鐵美玉青堊有草焉其狀如蓍而毛青華而白實其名曰􅚄音狼戾服之不夭言盡夀也或作芙可以為腹病為治也一作巳凡苦山之首自休與之山至于大騩之山凡十有九山千一百八十四里其十六神者皆豕身而人面其祠毛牷用一羊羞言以羊為薦羞嬰用一藻玉瘞藻玉玉有五彩者也或曰所以盛玉藻藉也苦山少室太室皆冢也其祠之太牢之具嬰以吉玉其神狀皆人面而三首其餘屬皆豕身人面也中次八經荆山之首曰景山今在南郡界中其上多金玉其木多杼檀杼音椽柱之柱雎水出焉雎音癰疽之疽東南流注于江今睢水出新城魏昌縣東南發阿山東南至南郡枝江縣入江也其中多丹粟多文魚有斑彩也東北百里曰荆山今在新城沐鄉縣南其陰多鐵其陽多赤金其中多犛牛旄牛屬也黑色出西南徼外也音狸一音來多虎豹其木多松栢其草多竹多橘櫾櫾似橘而大也皮厚味酸漳水出焉而東南流注于雎出荆山至南郡當陽縣入沮水其中多黃金多鮫魚鮫鮒魚𩔖也皮有珠文而堅尾長三四尺末有毒螫人皮可飾刀劒口錯治材角今臨海郡亦有之音交其獸多閭麋似鹿而大也又東北百五十里曰驕山其上多金其下多青䨼其木多松栢多桃枝鈎端神􅀢圍處之􅀢音鼉魚之鼉其狀如人面羊角虎爪恒遊于睢漳之淵淵水之府奥也出入有光又東北百二十里曰女几之山其上多玉其下多黄金其獸多豹虎多閭麋麖麂麂似獐而大偎毛豹脚音几其鳥多白鷮鷮似雉而長尾走且鳴音驕多翟多􅀈􅀈大如鵰紫綠色長頸赤喙食蝮蛇頭雄名運日雌名隂諧也又東北二百里曰宜諸之山其上多金玉其下多青䨼洈水出焉音詭而南流注于漳今洈水出南郡東洈山至華容縣入江也其中多白玉又東北三百五十里曰綸山音倫其木多梓柟多桃枝多柤栗橘櫾柤似梨而酢濇其獸多閭麈麢㚟㚟似菟而鹿脚青色音綽又東北二百里曰陸䣀之山音如跪告之跪其上多㻬琈之玉其下多堊其木多杻橿又東百三十里曰光山其上多碧其下多木神計蒙處之其狀人身而龍首恒遊于漳淵出入必有飄風暴雨又東百五十里曰岐山其陽多赤金其陰多白珉石似玉者音旻其上多金玉其下多青䨼其木多樗神涉􅀢處之徒河切一作􅀢笑遊切其狀人身而方面三足又東百三十里曰銅山其上多金銀鐵其木多榖柞柤栗橘櫾其獸多豹又東北一百里曰美山其獸多兕牛多閭麈多豕鹿其上多金其下多青䨼又東北百里曰大堯之山其木多松栢多梓桑多机其草多竹其獸多豹虎麢㚟又東北三百里曰靈山其上多金玉其下多青䨼其木多桃李梅杏梅似杏而酢也又東北七十里曰龍山上多寓木寄生也一名宛童見爾雅其上多碧其下多錫其草多桃枝鈎端又東南五十里曰衡山上多寓木榖柞多黄堊白堊又東南七十里曰石山其上多金其下多青䨼多寓木又南百二十里曰若山其上多㻬琈之玉多赭赤土多邽石未詳多寓木多柘若或作前又東南一百二十里曰彘山多美石多柘又東南一百五十里曰玉山其上多金玉其下多碧鐵其木多栢一作楢又東南七十里曰讙山其木多檀多邽石多白錫今白鑞也郁水出于其上潛于其下其中多砥礪又東北百五十里曰仁舉之山其木多穀柞其陽多赤金其陰多赭又東五十里曰師每之山其陽多砥礪其陰多青䨼其木多栢多檀多柘其草多竹又東南二百里曰琴鼓之山其木多榖柞椒柘椒為樹小而叢生下有草木則蠚死其上多白珉其下多洗石其獸多豕鹿多白犀其鳥多鴆凡荆山之首自景山至琴鼓之山凡二十三山二千八百九十里其神狀皆鳥身而人面其祠用一雄雞祈瘞禱請已埋之也用一藻圭糈用稌驕山冡也其祠用羞酒少牢祈瘞嬰毛一璧中次九經岷山之首曰女几之山其上多石􅄺其木多杻橿其草多菊􅙥洛水出焉東注于江其中多雄黃雄黃亦出水中其獸多虎豹又東北三百里曰岷山江水出焉岷山今在汶山郡廣陽縣西大江所出東北流注于海至廣陽縣入海其中多良龜良善多鼉似蜥蜴大者長二丈有鱗彩皮可以冒鼓其上多金玉其下多白珉其木多梅棠其獸多犀象多夔牛今蜀山中有大牛重數千斤名為䕫牛晉太興元年此牛出上庸郡人弩射殺得三十八擔肉即爾雅所謂魏其鳥多翰鷩白翰赤鷩又東北一百四十里曰崍山江水出焉卭來山今在漢嘉嚴道縣南江水所自出也山有九折坂出㹮㹮似熊而黒白駮亦食銅鐵也東流注大江其陽多黄金其陰多麋麈其木多檀柘其草多薤韭多葯即囂空奪即蛇被脫也又東一百五十里曰崌山音居江水出焉北江東流注于大江其中多怪蛇今永昌郡有鈎蛇長數丈尾岐在水中鉤取岸上人牛馬啖之又呼馬絆蛇謂此𩔖也多䲀魚音䞇未聞其木多楢杻楢剛木也中車材音秋多梅梓其獸多䕫牛麢㚟犀兕有鳥焉狀如鴞而赤身白首其名曰竊脂今呼小青萑曲觜肉食者為竊脂疑此非也可以禦火又東三百里曰髙梁之山其上多堊其下多砥礪其木多桃枝鉤端有草焉狀如葵而赤華莢實白柎可以走馬又東四百里曰蛇山其上多黄金其下多堊其木多栒多豫樟其草多嘉榮少辛有獸焉其狀如狐而白尾長耳名􅨓狼音巴見則國内有兵一作國有亂又東五百里曰鬲山其陽多金其陰多白珉蒲􅹸音薨之水出焉而東流注于江其中多白玉其獸多犀象熊羆多猨蜼蜼似獼猴鼻露上向尾四五尺頭有岐蒼黄色雨則自縣樹以尾塞鼻孔或以兩指塞之又東北三百里曰隅陽之山其上多金玉其下多青䨼其木多梓桑其草多茈徐之水出焉東流注于江其中多丹粟又東二百五十里曰岐山今在扶風美陽縣西其上多白金其下多鐵其木多梅梓梅或作􅀢音多杻楢減水出焉東南流注于江又東三百里曰勾檷之山音絡椐之椐其上多玉其下多黄金其木多櫟柘其草多芍藥又東一百五十里曰風雨之山其上多白金其下多石涅其木多棷樿棷木未詳也樿木白理中櫛騶善二音多楊宣余之水出焉東流注于江其中多蛇其獸多閭麋多麈豹虎其鳥多白鷮又東北二百里曰玉山其陽多銅其陰多赤金其木多豫樟楢杻其獸多豕鹿麢㚟其鳥多鴆又東一百五十里曰熊山有穴焉熊之穴恒出神人夏啓而冬閉是穴也冬啓乃必有兵今鄴西北有鼓山下有石鼓象懸著山旁鳴則有軍事與此穴殊象而同應其上多白玉其下多白金其木多樗柳其草多寇脱又東一百四十里曰騩山其陽多美玉赤金其陰多鐵其木多桃枝荆芭又東二百里曰葛山其上多赤金其下多瑊石瑊石勁石似玉也音緘其木多柤栗橘櫾楢杻其獸多麢㚟其草多嘉榮又東一百七十里曰賈超之山其陽多黄堊其陰多美赭其木多柤栗橘櫾其中多龍脩龍須也似莞而細生山石穴中莖倒垂可以為席凡岷山之首自女几山至于賈超之山凡十六山三千五百里其神狀皆馬身而龍首其祠毛用一雄雞瘞糈用稌文山勾檷風雨騩之山是皆冢也其祠之羞酒先進酒以酧神少牢具嬰毛一吉玉熊山席也席者神之所憑止也其祠羞酒太牢具嬰毛一璧干儛用兵以禳禳祓除之祭名儛者持盾武儛也祈璆冕舞所求福祥也祭用玉儛者冕服也美玉曰璆已求反中次十經之首曰首陽之山其上多金玉無草木又西五十里曰虎尾之山其木多椒椐多封石其陽多赤金其隂多鐵又西南五十里曰繁繢音潰之山其木多楢杻其草多枝勾今山中有此草又西南二十里曰勇石之山無草木多白金多水又西二十里曰復州之山其木多檀其陽多黄金有鳥焉其狀如鴞而一足彘尾其名曰跂踵見則其國大疫銘曰跂踵為鳥一足似䕫不為樂興反以來悲又西三十里曰楮山多寓木多椒椐多柘多堊一作渚州之山又西二十里曰又原之山其陽多青䨼其隂多鐵其鳥多鸜鵒鴝鵒也傳曰鴝鵒來巢音臞又西五十里曰涿山其木多榖柞杻其陽多㻬琈之玉又西七十里曰丙山其木多梓檀多弞杻弞義所未詳凡首陽山之首自首山至于丙山凡九山二百六十七里其神狀皆龍身而人面其祠之毛用一雄雞瘞糈用五種之糈堵山冢也其祠之少牢具羞酒祠嬰毛一璧瘞騩山帝也其祠羞酒太牢其合巫祝二人儛嬰一璧中次一十一山經荆山之首曰翼望之山湍水出焉鹿博反東流注于濟今湍水逕南陽穰縣而入清水貺水出焉音况東南流注于漢其中多蛟似蛇而四脚小頭細頸有白癭大者十數圍卵如一二石甕能吞人其上多松栢其下多漆梓其陽多赤金其陰多珉又東北一百五十里曰朝歌之山潕水出焉潕水今在南陽舞陽縣音武東南流注于榮其中多人魚其上多梓柟其獸多麢麋有草焉名曰莽草可以毒魚今用之殺魚又東南二百里曰帝囷之山去倫反其陽多㻬琈之玉其陰多鐵帝囷之水出于其上潛于其下多鳴蛇又東南五十里曰視山其上多韭有井焉名曰天井夏有水冬竭其上多桑多美堊金玉又東南二百里曰前山其木多櫧似柞子可食冬夏生作屋柱難腐音諸或作儲多柏其陽多金其陰多赭又東南三百里曰豐山有獸焉其狀如蝯赤目赤喙黄身名曰雍和見則國有大恐神耕父處之常遊清冷之淵出入有光清冷水在西號郊縣山上神來時水赤有光耀今有屋祠之見則其國為敗有九鐘焉是知霜鳴霜降則鐘鳴故言知也物有自然感應而不可為也其上多金其下多榖柞杻橿又東北八百里曰兔牀之山其陽多鐵其木多藷藇其草多雞榖其本如雞卵其味酸甘食者利于人又東六十里曰皮山多堊多赭其木多松柏又東六十里曰瑶碧之山其木多梓柟其陰多青䨼其陽多白金有鳥焉其狀如雉恒食蜚名曰鴆蜚負盤也音翡此更一種鳥非食蛇之鴆也又東四十里曰支離之山濟水出焉南流注于漢今濟水出酈縣西北山中南入漢酈離音字亦同有鳥焉其名曰嬰勺其狀如鵲赤目赤喙白身其尾若勺似酒勺形其鳴自呼多㸲牛多羬羊又東北五十里曰祑􅀢之山音彫其上多松柏机柏柏葉似柳皮黄不揩子似棟著酒中飲之辟惡氣浣衣去垢核堅正黒可以間香纓一名栝樓也又西北一百里曰堇理之山其上多松柏多美梓其陰多丹䨼多金其獸多豹虎有鳥焉其狀如鵲青身白喙白目白尾名曰青耕可以禦疫其鳴自叫又東南三十里曰依軲之山音枯其上多杻橿多苴未詳音􅉁有獸焉其狀如犬虎爪有甲其名曰獜言體有鱗甲音吝善駚􅱐跳躍自撲也鞅奮兩音食者不風不畏天風又東南三十五里曰即谷之山多美玉多𤣥豹黒豹也即今荆州山中出黒虎也多閭麈多麢㚟其陽多珉其陰多青䨼又東南四十里曰雞山其上多美梓多桑其草多韭又東南五十里曰髙前之山其上有水焉甚寒而青或作潛帝臺之漿也今河東解縣南檀首山上有水潛出停不流俗名為盎漿即此𩔖也飲之者不心痛其上有金其下有赭又東南三十里曰游戲之山多杻橿榖多玉多封石又東南三十五里曰從山其上多松柏其下多竹從水出于其上潛于其下其中多三足鼈枝尾三足龞名能見爾雅食之無蠱疫又東南三十里曰嬰䃌之山音真其上多松柏其下多梓櫄又東南三十里曰畢山帝苑之水出焉東北流注于視其中多水玉多蛟其上多㻬琈之玉又東南二十里曰樂馬之山有獸焉其狀如彚赤如丹火其名曰􅩰音戾見則其國大疫又東南二十五里曰葴山視水出焉或曰視宜為瀙瀙水今在南陽也東南流注于汝水其中多人魚多蛟多頡如青狗又東四十里曰嬰山其下多青䨼其上多金玉又東三十里曰虎首之山多苴椆椐椆未詳也音彫又東二十里曰嬰侯之山其上多封石其下多赤錫又東五十里曰大孰之山殺水出焉東北流注于視水其中多白堊又東四十里曰卑山其上多桃李苴梓多纍今虎豆狸豆之屬纍一名縢音誄又東三十里曰倚帝之山其上多玉其下多金有獸焉其狀如鼣鼠爾雅說鼠有十三種中有此鼠形所未詳也音狗吠之吠白耳白喙名曰狙如音即蛆見則其國有大兵又東三十里曰鯢山音倪鯢水出于其上潛于其下其中多美堊其上多金其下多青䨼又東三十里曰雅山澧水出焉音禮今澧水出南陽東流注于視水其中多大魚其上多美桑其下多苴多赤金又東五十里曰宣山淪水出焉東南流注于視水其中多蛟其上有桑焉大五十尺圍五丈也其枝四衢言枝交互四出其葉大尺餘赤理黃華青柎名曰帝女之桑婦女主􅁞故以名桑又東四十五里曰衡山今衡山在衡陽湘南縣南嶽也俗謂之岣嶁山其上多青䨼多桑其鳥多鸜鵒又東四十里曰豐山其上多封石其木多桑多羊桃狀如桃而方莖一名鬼桃可以為皮張治皮腫起又東七十里曰嫗山其上多美玉其下多金其草多雞榖又東三十里曰鮮山其木多楢杻苴其草多􅚂冬其陽多金其陰多鐵有獸焉其狀如膜大赤喙赤目白尾見則其邑有火名曰􅦺即音移又東三十里曰章山或作童山其陽多金其陰多美石臯水出焉東流注于澧水其中多脆石未聞魚脆反又東二十五里曰大支之山其陽多金其木多榖柞無草木又東五十里曰區吳之山其木多苴又東五十里曰聲匈之山其木多榖多玉上多封石又東五十里曰大騩之山上已有此山疑同名其陽多赤金其陰多砥石又東十里曰踵臼之山無草木又東北七十里曰歴或作磨石之山其木多荆芑其陽多黄金其陰多砥石有獸焉其狀如狸而白首虎爪名曰梁渠見則其國有大兵又東南一百里曰求山求水出于其上潛于其下中有美赭其木多苴多䉋篠屬其陽多金其陰多鐵又東二百里曰丑陽之山其上多椆椐有鳥焉其狀如烏而赤足名曰􅀈餘音如枳柑之枳可以禦火又東三百里曰奧山其上多柏杻橿其陽多㻬琈之玉奥水出焉東流注于視水又東三十五里曰服山其木多苴其上多封石其下多赤錫又東百十里曰杳山其上多嘉榮草多金玉又東三百五十里曰几山其木多楢檀杻其草多香有獸焉其狀如彘黃身白頭白尾名曰聞􅡁音隣見則天下大風􅡁一作音瓶凡荆山之首自翼望之山至于几山凡四十八山三千七百三十二里其神狀皆彘身人首其祠毛用一雄雞祈瘞用一珪糈用五種之精禾山帝也其祠太牢之具羞瘞倒毛薦羞反倒牲埋之也用一璧牛無常堵山玉山冢也皆倒祠羞毛少牢嬰毛吉玉中次十二經洞庭山之首曰篇遇之山或作肩無草木多黃金又東南五十里曰雲山無草木有桂竹甚毒傷人必死今始興郡桂陽縣出筀竹大者圍二尺長四丈乂交趾有篥竹實中勁强有毒銳以刺虎中之則死亦此𩔖也其上多黃金其下多㻬琈之玉又東南一百三十里曰龜山其木多榖柞椆椐其上多黄金其下多青雄黃多扶竹卭竹也髙節實中中杖也名之扶老竹又東七十里曰丙山多筀竹多黄金銅鐵無木又東南五十里曰風伯之山其上多金玉其下多痠石文石未詳痠石之義多鐵其木多柳杻檀楮其東有林焉名曰莽浮之林多美木鳥獸又東一百五十里曰夫夫之山其上多黄金其下多青雄黃其木多桑楮其草多竹雞鼓神于兒居之其狀人身而身操兩蛇常遊于江淵出入有光又東南一百二十里曰洞庭之山今長沙巴陵縣西又有洞庭陂潛伏通江離騷曰邅吾道兮洞庭洞庭波兮木葉下皆謂此也字或作銅宜從水其上多黄金其下多銀鐵其木多柤梨橘櫾其草多葌蘪蕪芍藥芎藭蘪蕪似蛇牀而香也帝之二女居之天帝之二女而處江為神即列仙傳江妃二女也離騷九歌所謂湘夫人稱帝子者是也而河圗玉版曰湘夫人者帝堯女也秦始皇浮江至湘山逢大風而問博士湘君何神博士曰聞之堯二女舜妃也死而葬此列女傳曰二女死于江湘之間俗謂為湘君鄭司農亦以舜妃為湘君說者皆以舜陟方而死二妃從之俱溺死於湘江遂號為湘夫人按九歌湘君湘夫人自是二神江湘之有夫人猶河洛之有虙妃也此之為靈與天地並矣安得謂之堯女且既謂之堯女安得復總云湘君哉何以考之禮記曰舜葬蒼梧二妃不從明二妃生不從征死不從葬義可知矣即令從之二女靈達鑒通無方尚能以鳥工龍裳救井廪之難豈尚不能自免于風波而有雙淪之患乎假復如此傳曰生為上公死為貴神禮五嶽比三公四瀆比諸侯令湘川不及四瀆無秩於命祀而二女帝者之后配靈神祇無緣當復下降小水而為夫人也參互其義義既混錯錯綜其理理無可據斯不然矣原其致謬之由由乎俱以帝女為名名實相亂莫矯其失習非勝是終古不悟可悲矣是常遊于江淵澧沅之風交瀟湘之淵此言二女遊戲江之淵府則能鼔三江令風波之氣共相交通言其靈響之意也江湘沅水皆共㑹巴陵頭故號為三江之口澧又去之七八十里而入江焉淮南子曰弋釣瀟湘今所在未詳也瀟音消是在九江之間地理志九江今在潯陽南江自潯陽而分為九皆東會于大江書曰九江孔殷是也出入必以飄風暴雨是多怪神狀如人而載蛇左右手操蛇多怪鳥又東南一百八十里曰􅍊山其木多㯶柟荆芑竹箭䉋箘箘亦篠𩔖中箭見禹貢其上多黄金玉其下多文石鐵其獸多麋鹿􅕱就就鵰也見廣雅又東南二百里曰即公之山其上多黄金其下多㻬琈之玉其木多柳杻檀桑有獸焉其狀如龜而白身赤首名曰蛫音詭是可以禦火又東南一百五十九里曰堯山其陰多黃堊其陽多黃金其木多荆芑柳檀其草多藷藇􅙥又東南一百里曰江浮之山其上多銀砥礪無草木其獸多豕鹿又東二百里曰真陵之山其上多黃金其下多玉其木多榖柞柳杻其草多榮草又東南一百二十里曰陽帝之山多美銅其木多橿杻檿楮檿山桑也其獸多麢麝又南九十里曰柴桑之山今在潯陽柴桑縣南其廬山相連也其上多銀其下多碧多冷石赭其木多柳芑楮桑其獸多麋鹿多白蛇飛蛇即螣蛇乗霧而飛者又東二百三十里曰榮余之山其上多銅其下多銀其木多柳芑其蟲多怪蛇怪蟲凡洞庭山之首自篇遇之山至于榮余之山凡十五山二千八百里其神狀皆鳥身而龍首其祠毛用一雄雞一牝豚刉刉亦割刺之名糈用稌凡夫夫之山即公之山堯山陽帝之山皆冡也其祠皆肆瘞肆陳之也陳牲玉而後埋藏之祈用酒毛用少牢嬰毛一吉玉洞庭榮余山神也其祠皆肆瘞肆竟然後依前埋之也祈酒太牢祠嬰用圭璧十五五彩惠之惠猶飾也方言也右中經之山志大凡百九十七山二萬一千三百七十一里大凡天下名山五千三百七十居地大凡六萬四千五十六里禹曰天下名山經五千三百七十山六萬四千五十六里居地也言其五臧蓋其餘小山甚衆不足記云天地之東西二萬八千里南北二萬六千里出水之山者八千里受水者八千里出銅之山四百六十七出鐵之山三千六百九十此天地之所分壤樹榖也戈矛之所發也刀鎩之所起也能者有餘拙者不足封於太山禪於梁父七十二家得失之數皆在此内是謂國用管子地數云封禪之王七十二家也右五臧山經五篇大凡一萬五千五百三字山海經卷五
