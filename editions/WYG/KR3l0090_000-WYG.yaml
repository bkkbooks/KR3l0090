front:
  text: 欽定四庫全書子部十二
  hash: sha256:b91c7627c34399fce720371900e7def4c0469982b792a8bd4a0a78b88d470d59
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3l0090_WYG_000-1a, image: WYG1042/WYG1042-0001a.png}
body:
  text: 山海經小說家𩔖二異聞之屬提要臣等謹案山海經十八卷晉郭璞注首有劉秀校上奏稱為伯益所作案山海經之名始見史記大宛傳司馬􅁶但云禹本記山海經所言怪物余不敢道而未言為何人所作列子稱大禹行而見之伯益知而名之夷堅聞而志之似乎即指此書而不言其名山海經王充論衡别通篇曰禹主行水益主記異物海外山表無所不至以所見聞作山海經趙煜呉越春秋所説亦同惟隋書經籍志云蕭何得秦圖書後又得山海經相傳夏禹所記其文稍異然似皆因列子之説推而衍之觀書中載夏后啓周文王及秦漢長沙象郡餘暨下嶲諸地名㫁不作於三代以上殆周秦間人所述而後來好異者又附益之歟觀楚詞天問多與相符使古無是言屈原何由杜撰朱子楚詞辨證謂其反因天問而作似乎不然至王應麟王㑹補傳引朱子之言謂山海經記諸異物飛走之𩔖多云東向或曰東首疑本因圖畫而述之古有此學如九歌天問皆其𩔖云云則得其實矣郭璞注是書見於晉書本傳隋唐二志皆云二十三卷今本乃少五卷疑後人併其卷帙以就劉秀奏中一十八篇之數非缺佚也隋唐志又有郭璞山海經圖讚二卷今其讚猶載璞集中其圖則宋志已不著録知久佚矣舊本所載劉秀奏中稱其書凡十八篇與漢志稱十三篇者不合七略即秀所定不應自相牴牿疑其贋托然璞序已引其文相傳既久今仍併錄焉書中序述山水多參以神怪故道藏収入太元部競字號中䆒其本㫖實非黄老之言然道理山川率雞考據按以耳目所及百不一真諸家並以為地理書之冠亦為未允核實定名實則小説之最古者爾乾隆四十六年正月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀山海經原序世之覽山海經者皆以其閎誕迂誇多竒怪俶儻之言莫不疑焉嘗試論之曰莊生有云人之所知莫若其所不知吾於山海經見之矣夫以宇宙之寥廓羣生之紛紜隂陽之煦蒸萬殊之區分精氣渾淆自相噴薄遊魂靈怪觸𧰼而構流形於山川麗狀於木石者惡可勝言乎然則總其所以乖鼔之於一響成其所以變混之於一𧰼世之所謂異未知其所以異世之所謂不異未知其所以不異何者物不自異待我而後異異果在我非物異也故胡人見布而疑黂越人見罽而駭毳夫翫所習見而竒所希聞此人情之常蔽也今畧舉可以明之者陽火出於氷水隂鼠生於炎山而俗之論者莫之或怪及談山海經所載而咸怪之是不怪所可怪而怪所不可怪也不怪所可怪則幾於無怪矣怪所不可怪則未始有可怪也夫能然所不可不可所不可然則理無不然矣案汲郡竹書及穆天子傳穆王西征見西王母執璧帛之好獻錦組之屬穆王享王母於瑶池之上賦詩􅉨來辭義可觀遂襲崑崙之丘遊軒轅之宫眺鍾山之嶺玩帝者之寳勒石王母之山紀迹𤣥圃之上乃取其嘉木豔草竒鳥怪獸玉石珍瑰之器金膏燭銀之寳歸而殖養之於中國穆王駕八駿之乘右服盜驪左驂騄耳造父為御犇戎為右萬里長騖以周厯四􅂽名山大川靡不登濟東升大人之堂西燕王母之廬南轢黿鼉之梁北躡積羽之衢窮歡極娛然後旋歸案史記説穆王得盜驪騄耳驊騮之驥使造父御之以西廵狩見西王母樂而忘歸亦與竹書同左傳曰穆王欲肆其心使天下皆有車轍馬迹焉竹書所載則是其事也而譙周之徒足為通識瑰儒而雅不平此驗之史考以著其妄司馬遷叙大宛傳亦云自張騫使大夏之後窮河源惡覩所謂崑崙者乎至禹本紀山海經所有怪物余不敢言也不亦悲乎若竹書不潛出於千載以作徴於今日者則山海之言其幾乎廢矣若乃東方生曉畢方之名劉子政辨盜械之尸王頎訪兩面之客海民獲長臂之衣精驗潛効絶代縣符於戲羣惑者其可以少寤乎是故聖皇原化以極變𧰼物以應怪鑒無滯􅄨曲盡幽情神焉廋哉神焉廋哉蓋此書跨世七代厯載三千雖暫顯於漢而尋亦寢廢其山川名號所在多有舛謬與今不同師訓莫傳遂將湮泯道之所存俗之所喪悲夫余有懼焉故為之創傳疏其壅閡闢其茀蕪領其𤣥致標其洞渉庶幾令逸文不墜於世奇言不絶於今夏后之迹靡刋於將來八􅂽之事有聞於後裔不亦可乎夫蘙薈之翔叵以論垂天之凌蹏涔之遊無以知絳虯之騰鈞天之庭豈伶人之所躡無航之津豈蒼兕之所渉非天下之至通難與言山海之義矣於戲達觀博物之客其鑒之哉郭璞序
