body:
  text: 山海經卷十八晉郭璞撰海内經東海之内北海之隅有國名曰朝鮮天毒其人水居朝鮮今樂浪郡也天毒即天竺國貴道徳有文書金銀錢貨浮屠出此國中也晋大興四年天竺胡王獻珍寳偎人愛之偎亦愛也音𨼆隈反西海之内流沙之中有國名曰壑市音郝西海之内流沙之西有國名曰氾葉音如氾濫之氾流沙之西有鳥山者三水出焉三水同出一山也爰有黄金璿瑰丹貨銀鐵皆流于此中言其中有雜珍竒寳也又有淮山好水出焉流沙之東黑水之西有朝雲之國司􅇾之國黄帝妻雷祖生昌意世本云黄帝娶于西陵氏之子謂之纍祖産青陽及昌意昌意降處若水生韓流竹書云昌意降居若水産帝乾荒乾荒即韓流也生帝顓頊韓流擢首謹耳擢首長咽謹耳未聞人面豕喙麟身渠股渠車輛言跰脚也大傳曰大如車渠豚止止足取淖子曰阿女生帝顓頊世本云顓頊母濁山氏之子名昌僕流沙之東黑水之間有山名不死之山即員丘也華山青水之東有山名曰肇山有人名曰柏高柏子高仙者也柏高上下於此至于天言翺翔雲天徃來此山也西南黑水之間有都廣之野后稷葬焉其城方三百里盖天下之中素女所出也離騷曰絶都廣野而直指號爰有膏菽膏稻膏黍膏稷言味好甘滑如膏外傳曰膏粢之子菽豆粢粟也百榖自生冬夏播琴播琴猶播殖方俗言耳鸞鳥自歌鳯鳥自儛靈壽實華靈壽木名也似竹有枝節草木所聚在此叢殖也爰有百獸相羣爰處於此羣聚此草也冬夏不死南海之内黑水青水之間有水名曰若木𣗳赤華青若水出焉有禺中之國有列襄之國有靈山有赤蛇在木上名曰蝡蛇木食言不食禽獸也音如耎弱之耎有鹽長之國有人焉鳥首名曰鳥氏今佛書中有此人即鳥夷也有九丘以水絡之絡猶繞也名曰陶唐之丘陶唐堯號有叔得之丘孟盈之丘昆吾之丘此山出名金也尸子曰昆吾之金黑白之丘赤望之丘參衛之丘武夫之丘此山出美石神民之丘言上有神人有木青葉紫莖𤣥華黄實名曰建木百仭無枝有九欘枝回曲也音如斤斸之斸下有九枸根盤錯也淮南子曰大木則根欋音劬其實如麻似麻子也其葉如􅉭􅉭木似棠梨也大皥爰過言庖羲於此經過也黄帝所為言治䕶之也有窫窳龍首是食人在弱水中有青獸人面名曰猩猩能言西南有巴國今三已是大皥生咸鳥咸鳥生乘釐乘釐生後照後照是始為巴人為之始祖有國名曰流黄辛氏即鄷氏也其域中方三百里其出是塵土言殷盛也有巴遂山澠水出焉又有朱卷之國有黑蛇青首食𧰼即巴蛇也南方有贑巨人即梟陽也音感人面長臂黑身有毛反踵見人笑亦笑唇蔽其面因即逃也又有黑人虎首鳥足兩手持蛇方啗之有羸民鳥足音盈有封豕大猪也羿射殺之有人曰苖民三苖民也有神焉人首蛇身長如轅大如車轂澤神也左右有首岐頭衣紫衣冠旃冠名曰延維委蛇人主得而饗食之伯天下齊桓公出田於大澤見之遂覇諸侯亦見莊周作朱冠有鸞鳥自歌鳯鳥自儛鳯鳥首文曰德翼文曰順膺文曰仁背文曰義見則天下和言和平也又有青獸如莵名曰􅀢狗音如朝菌之菌有翠鳥有孔鳥孔雀也南海之内有衡山南嶽有􅌲山音芝菌之菌有桂山或云衡山有菌桂桂員似竹見本草有山名三天子之都一本三天子之鄣山南方蒼梧之丘蒼梧之淵其中有九嶷音疑山舜之所塟在長沙零陵界中山今在零陵營道縣南其山九谿皆相似故云九疑古者總名其地為蒼梧也北海之内有蛇山者蛇水出焉東入于海有五彩之鳥飛蔽一鄉漢宣帝元康元年五色鳥以萬數過蜀都即此鳥也名曰翳鳥鳯属也離騷曰駟玉虬而乘翳又有不距之山巧倕葬其西倕堯巧工也音端北海之内有反縛盗械帶戈常倍之佐名曰相顧之尸亦貳負臣危之𩔖伯夷父生西岳西岳生先龍先龍是始生氐羌氐羌乞姓伯夷父顓頊師今氐羌其苖裔也北海之内有山名曰幽都之山黑水出焉其上有𤣥鳥𤣥蛇𤣥豹𤣥虎黑虎名儵見爾雅𤣥孤蓬尾蓬叢也阻留反說苑曰蓬狐文豹之皮有大𤣥之山有𤣥丘之民言丘上人物盡黑也有大幽之國即幽民也穴居無衣有赤脛之民膝已下正赤色有釘靈之國其民從膝已下有毛馬蹄善走詩含神霧日馬蹄自鞭其蹄日行三百里炎帝之孫伯陵伯陵同吳權之妻阿女縁婦同猶通言淫之也吳權人姓名縁婦孕三年孕懐身也是生鼓延殳始為侯三子名也殳音殊鼓延是始為鍾世本云母句作罄倕作鐘為樂風作樂之曲制黄帝生駱明駱明生白馬白馬是為鯀即禹父也世本曰黄帝生昌意昌意生顓頊顓頊生鯀帝俊生禺號禺號生淫梁淫梁生番禺是始為舟世本云共鼓貨狄作舟番禺生奚仲奚仲生吉光吉光是始以木為車世本云奚仲作車此言吉光明其父平共創作意是以互稱之少皥生般音班般是始為􅃓矢世本云牟夷作矢揮作􅃓􅃓矢一器作者兩人於義有疑此言般之作是帝俊賜羿彤􅃓素矰彤弓朱􅃓矰矢名以白羽羽之外傳白羽之矰望之如荼也以扶下國言令羿以射道除患扶助下國羿是始去恤下地之百艱言射殺鑿齒封豕之属也有窮后羿慕羿射故號此名也帝俊生晏龍晏龍是為琴瑟世本云伏羲作琴神農作瑟帝俊有子八人是始為歌舞帝俊生三身三身生義均義均是始為巧倕是始作下民百巧后稷是播百榖稷之孫曰叔均是始作牛耕始用牛犂大比赤隂或作音是始為國得封為國禹鯀是始布土均定九州布猶敷也書曰禹敷土奠高山大川炎帝之妻赤水之子聽訞生炎居炎居生節並節並生戲器戲器生祝融祝融髙辛氏火正號祝融降處於江水生共工共工生術器術器首方顚頭頂平也是復土穰以處江水復祝融之所也共工生后土后土生噎鳴噎鳴生歳十有二生十二子皆以歳名名之故云然洪水滔天滔漫也鯀竊帝之息壤以堙洪水息壤者言土自長息無限故可以塞洪水也開筮曰滔滔洪水無所止極伯鯀乃以息石息壤以塡洪水漢元帝時臨淮徐縣地涌長五六里髙二丈即息壤之𩔖也不待帝命帝令祝融殺鯀于羽郊羽山之郊鯀復生禹開筮曰鯀死三歳不腐剖之以呉刀化為黄龍也帝乃命禹卒布土以定九州鯀績用不成故復命禹終其功山海經卷十八
