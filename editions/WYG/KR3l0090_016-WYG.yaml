body:
  text: 山海經卷十六晉郭璞撰大荒西經西北海之外大荒之隅有山而不合名曰不周負子淮南子曰昔者共工與顓頊争帝怒而觸不周之山天維絶地柱折故今此山缺壊不周匝也有兩黄獸守之有水曰寒暑之水水西有濕山水東有幕山音莫有禹攻共工國山言攻其國殺其臣相柳於此山啓筮曰共工人面蛇身朱髪也有國名曰淑士顓頊之子言亦出自高陽氏也有神十人名曰女媧之腸或作女媧之腹化為神處栗廣之野女媧古神女而帝者人面蛇身一日中七十變其腹化為此神栗廣野名媧音𤓰横道而處言斷道也有人名曰石夷來風曰韋來或作本也處西北隅以司日月之長短言察日月晷度之節有五彩之鳥有冠名曰㹥鳥爾雅云㹥夢鳥即此也有大澤之長山有白氏之國西北海之外赤水之東有長脛之國脚長三丈有西周之國姬姓食榖有人方耕名曰叔均帝俊生后稷俊宜為嚳嚳第二妃生后稷也稷降以百榖稷之弟曰台璽音胎生叔均叔均是代其父及稷播百榖始作耕有赤國妻氏有雙山西海之外大荒之中有方山者上有青𣗳名曰柜格之松木名音矩日月所出入也西北海之外赤水之西有先民之國食榖使四鳥有北狄之國黄帝之孫曰始均始均生北狄有芒山有桂山有揺山此山多桂及揺木因名云耳其上有人號曰太子長琴顓頊生老童世本云顓頊娶于滕墳氏謂之女禄産老童也老童生祝融即重黎也高辛氏火正號曰祝融也祝融生太子長琴是處榣山始作樂風創制樂風曲也有五彩鳥三名一曰皇鳥一曰鸞鳥一曰鳯鳥有蟲狀如莵胷以後者裸不見言皮色青故不見其祼露處青如猨狀狀又似猨大荒之中有山名曰豐沮玉門日月所入有靈山巫咸巫即巫朌巫彭巫姑巫眞巫禮巫抵巫謝巫羅十巫從此升降百藥爰在羣巫上下此山米之也西有王母之山壑山海山皆羣大靈之山有沃之國言其土饒沃也沃民是處沃之野鳯鳥之卵是食甘露是飲凡其所欲其味盡存言其所願滋味此無所不備爰有甘華甘柤白桞視肉三騅璇瑰瑶碧琁瑰亦玉名穆天子傳曰枚斯璿瑰枝回二音白木琅玕樹色正白今南方有文木亦黑木也白丹青丹又有黒丹也孝經援神契曰王者徳至山陵而黑丹出然則丹者别是彩名亦猶黒白黄皆云丹也多銀鐡鸞鳥自歌鳯鳥自舞爰有百獸相羣是處是謂沃之野有三青鳥赤首黑目一名曰大􅝼一名少􅝼音黎一名曰青鳥皆西王母所使也有軒轅之臺射者不敢西嚮射畏軒轅之臺敬畏黄帝之神大荒之中有龍山日月所入有三澤水名曰三淖昆吾之所食也穆天子傳曰滔水濁繇氏之所食亦此𩔖也有人衣青以袂蔽面􅃑䄂名曰女丑之尸有女子之國王頎至沃沮國盡東界間其耆老曰國人常乘船捕魚遭風見吹數十日東一國在大海中純女無男即此國也有桃山有䖟山有桂山有于土山有丈夫之國其國無婦人也有弇州之山五彩之鳥仰天張口嘘天名曰鳴鳥爰有百樂歌儛之風爰有百種伎樂歌儛風曲有軒轅之國其人人面蛇身江山之南棲為吉即窮山之際也山居為棲吉者言無凶夭不壽者乃八百歳壽者數千歳西海陼中有神人面鳥身珥兩青蛇踐兩赤蛇名曰弇茲大荒之中有山名曰日月山天樞也呉姖天門日月所入有神人面無臂兩足反屬於頭山名曰嘘言嘘啼也顓頊生老童老童生重及黎世本云老童娶于根水氏謂之驕福産重及黎帝令重獻上天令黎卬下地古者人神雜擾無别顓頊乃命南正重司天以属神命火正黎司地以属民重實上天黎實下地獻卬義未詳也下地是生噎處於西極以行日月星辰之行次主察日月星辰之度數次舍也有人反臂名曰天虞即尸虞也有女子方浴月帝俊妻常羲生月十有二此始浴之義與羲和浴日同有𤣥丹之山出黒丹也有五色之鳥人面有髪爰有青鴍音文黄鷔音敖青鳥黄鳥其所集者其國亡有池名孟翼之攻顓頊之池孟翼人姓名大荒之中有山名曰鏖鏊鉅鏊音如敖日月所入者有獸左右有首名曰屏蓬即并封也語有輕重耳有巫山者有壑山者有金門之山有人名曰黄姖之尸有比翼之鳥有白鳥青翼黄尾𤣥喙竒鳥有赤犬名曰天犬其所下者有兵周書云天狗所止地盡傾餘光燭天為流星長十數丈其疾如風其聲如雷其光如電呉楚七國反時吠過梁國者是也西海之南流沙之濵赤水之後黑水之前有大山名曰崑崙之丘有神人面虎身有文有尾皆白處之言其尾以白為㸃駮其下有弱水之淵環之其水不勝鴻毛其外有炎火之山投物輒然今去扶南東萬里有耆薄國東復五千里許有火山國其山雖霖雨火常然火中有白鼠時出山邉求食人捕得之以毛作布今之火澣布是也即此山之𩔖有人戴勝虎齒有豹尾穴處名曰西王母河圖玉版亦曰西王母居崑崙之山西山經曰西王母居玉山穆天子傳曰乃紀名迹于弇山之石曰西王母之山也然則西王母雖以崑崙之宫亦自有離宫别窟逰息之處不專住一山也故記事者各舉所見而言之此山萬物盡有大荒之中有山名曰常陽之山日月所入有寒荒之國有二人女祭女薎或持觶或持爼有壽麻之國吕氏春秋曰南服壽麻北懷闒耳南嶽娶州山女名曰女䖍女䖍生季格季格生壽麻壽麻正立無景疾呼無嚮言其禀形氣有異於人也列仙傳曰𤣥俗無景爰有大暑不可以徃言熱炙殺人也有人無首操戈盾立名曰夏耕之尸亦行天尸之𩔖故成湯伐夏桀于章山克之于章山名斬耕厥前頭亦在前者耕既立無首走厥咎逃避罪也乃降于巫山自竄于巫山巫山今在建平巫縣有人名曰呉回竒左是無右臂即竒肱也呉回祝融弟亦為火正也有盖山之國有𣗳赤皮支幹青葉名曰朱木或作朱威木也有一臂民北極下亦有一脚人見河圖玉版大荒之中有山名曰大荒之山日月所入有人焉三面是顓頊之子三面一臂無左臂也三面之人不死言人頭三邉各有面也𤣥菟太守王頎至沃沮國問其耆老云復有一破船随波出在海㟁邉上有一人項中復有面與語不解了不食而死此是兩面人也呂氏春秋曰一臂三面之鄉也是謂大荒之野西南海之外赤水之南流沙之西有人珥兩青蛇乘兩龍名曰夏后開開上三嬪于天嬪婦也言獻美女于天帝得九辯與九歌以下皆天帝樂名也開登天而竊以下用之也開筮曰昔彼九㝠是與帝辯同宫之序是為九歌又曰不得竊辯與九歌以國于下義具見于歸藏此穆天之野高二千仭竹書曰顓頊産伯鯀是維居陽居天穆之陽也開焉得始歌九招竹書曰夏后開舞九招也有互人之國人面魚身炎帝之孫炎帝神農名曰靈恝音如券契之契靈恝生互人是能上下于天言能乘雲雨也有魚偏枯名曰魚婦顓頊死即復蘓言其人能變化也風道北來天乃大水泉言泉水得風暴溢出道猶從也韓非曰𤣥鶴二八道南方而來蛇乃化為魚是謂魚婦顓頊死即復蘓淮南子曰后稷龍在建水西其人死復蘓其中為魚葢謂此也有青鳥身黄赤足六首名曰􅨰鳥音觸有大巫山有金之山西南大荒之中隅有徧勾常羊之山山海經卷十六
