body:
  text: 山海經卷十二晉郭璞撰海内北經海内西北陬以東者蛇巫之山上有人操杯而東向立一曰龜山杯或作棓字同西王母梯几而戴勝杖梯謂憑也其南有三青鳥為西王母取食又有三足鳥主給使在崑崙墟北有人曰大行伯把戈其東有犬封國昔盤瓠殺戎王髙辛以美女妻之不可以訓乃浮之㑹稽東海中得三百里地封之生男為狗女為美人是為狗封之國也貳負之尸在大行伯東犬封國曰犬戎國狀如犬黄帝之後卞明生白犬二頭自相牝牡遂為此國言狗國也有一女子方跪進柸食與酒食也有文馬縞身色白如縞朱鬛目若黄金名曰吉量一作良乘之壽千歳周書曰犬戎文馬赤鬛白身目若黄金名吉良之乘成王時獻之六韜曰文身朱鬛眼若黄金項若雞尾名曰雞斯之乘大傳曰駮身朱鬛雞目山海經亦有吉黄之乘壽千歳者惟名有不同說有小錯其實一物耳今博舉之以廣異聞也鬼國在貳負之尸北為物人面而一目一曰貳負神在其東人面蛇身蜪犬音陶或作蚼音鈎如犬青食人從首始窮竒狀如虎有翼毛如蝟食人從首始所食𬒳髪在蜪犬北一曰從足帝堯臺帝嚳臺帝丹朱臺帝舜臺各二臺臺四方在崑崙東北此盖天子廵狩所經過夷狄慕聖人恩徳輒共為築立臺觀以標顯其遺跡也一本云所殺相桞地腥臊不可種五榖以為衆帝之臺大蠭其狀如螽朱蛾其狀如蛾蛾蚍蜉也楚詞曰𤣥蜂如壺赤蛾如象謂此也蟜其為人虎文脛有䏿言脚有膊腸也蟜音橋在窮竒東一曰狀如人崑崙墟北所有此同上物事也闒非人面而獸身青色闒音榻據北一云掾比之尸其為人折頸𬒳髪無一手環狗其為人獸首人身一曰蝟狀如狗黄色袜其為物人身黑首從目袜即魅也戎其為人人首三角林氏國有珍獸大若虎五彩畢具尾長于身名曰騶吾乘之日行千里六韜云紂囚文王閎夭之徒詣林氏國求得此獸獻之紂大悦乃釋之周書曰夾林酋耳酋耳若虎尾參於身食虎豹大傳謂之侄獸吾宜作虞也崑崙墟南有所汜林方三百里從極之淵深三百仭維氷夷恒都焉氷夷馮夷也淮南云馮夷得道以潛大川即河伯也穆天子傳所謂河伯無夷者竹書作馮夷字或作氷也氷夷人面乘兩龍畵四面各乗靈車駕二龍一曰忠極之淵陽汙之山河出其中凌門之山河出其中皆河之枝源所出之處也王子夜之尸兩手兩股胷首齒皆斷異處此盖形解而神連貌乖而氣合合不為宻離不為踈舜妻登比氏生宵明燭光即二女字也以能光照因名云處河大澤澤河邊溢漫處二女之靈能照此所方百里言二女神光所燭及者方百里一曰登北氏葢國在鉅燕南倭北倭屬燕倭國在帶方東大海内以女為主其俗露紒衣服無針助以丹朱塗身不妬忌一男子數十婦也朝鮮在列陽東海北山南列陽屬燕朝鮮今樂浪縣箕子所封也列亦水名也今在帶方帶方有列口縣列姑射在海河洲中山名也山有神人河洲在海中河水所經者莊子所謂藐姑射之山也姑射國在海中属列姑射西南山環之大蟹在海中葢千里之蟹也陵魚人面手足魚身在海中大鯾居海中鯾即魴也音鞭明組音祖邑居海中蓬萊山在海中上有仙人宫室皆以金玉為之鳥獸盡白望之如雲在渤海中也大人之市在海中山海經卷十二
