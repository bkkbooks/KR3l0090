body:
  text: 山海經卷二晉郭璞撰西山經西山經華山之首曰錢來之山其上多松其下多洗石澡洗可以磢體去垢圿磢初兩反有獸焉其狀如羊而馬尾名曰羬羊今大月氐國有大羊如驢而馬尾爾雅云羊六尺為羬謂此羊也羬音針其脂可以已腊治體皴腊音昔西四十五里曰松果之山濩水出焉北流注于渭其中多銅有鳥焉其名曰䳋渠䳋音彤弓之彤其狀如山雞黑身赤足可以已𦢊謂皮皺起也音叵駮反又西六十里曰太華之山即西岳華隂山也今在𢎞農華陰縣西南削成而四方今山形上大下小峭峻也其髙五千仭其廣十里仭八尺也上有明星玉女持玉漿得上服之即成仙道險僻不通時含神霧云鳥獸莫居有蛇焉名曰肥􅖆六足四翼見則天下大旱湯時此蛇見於陽山下復有肥遺蛇疑是同名又西八十里曰小華之山即少華山其木多荆杞其獸多㸲牛今華陰山中多山牛山羊肉皆千斤牛即此牛也音昨其陰多磬石可以為樂石其陽多㻬琈之玉㻬琈玉名所未詳也濡浮兩音鳥多赤鷩赤鷩山雞之屬胷腹洞赤冠金皆黄頭緑尾中有赤毛彩鮮明音作蔽或作鼈可以禦火其草有萆荔萆荔香草也蔽戾兩音狀如烏韭而生於石上亦緣木而生烏韭在屋者曰昔邪在牆者曰垣衣食之已心痛又西八十里曰符禺之山其陽多銅其陰多鐵其上有木焉名曰文莖其實如棗可以已聾其草多條其狀如葵而赤花黄實如嬰兒舌食之使人不惑符禺之水出焉而北流注于渭其獸多葱聾其狀如羊而赤鬛其鳥多鴖音旻其狀如翠而赤喙翠似燕而紺色也可以禦火畜之辟火災也又西六十里曰石脆之山其木多椶柟椶樹髙三丈許無枝條葉大而員枝生梢頭實皮相裹上行一皮者為一節可以為繩一名栟櫚音馬騣之騣其草多條其狀如韭而白華黑實食之已疥其陽多㻬琈之玉其陰多銅灌水出焉而北流注于禺水其中有流赭赭赤土以塗牛馬無病今人亦以朱塗牛角云以辟惡馬或作角又西七十里曰英山其上多杻橿杻似棣而細葉一名土橿音紐橿木中車材音姜其陰多鐵其陽多赤金禺水出焉北流注于招水音韶其中多䰷魚音同蚌蛤之蚌其狀如鼈其音如羊其陽多箭䉋今漢中郡出䉋竹厚裏而長節根深筍冬生地中人掘取食之䉋音媚其獸多㸲牛羬羊有鳥焉其狀如鶉黃身而赤喙其名曰肥遺食之已癘癘疫病也或曰惡瘡韓子曰癘人憐主可以殺蟲又西五十二里曰竹山其上多喬木枝上竦者音橋其陰多鐵有草焉其名曰黄雚其狀如樗其葉如麻白華而赤實其狀如赭紫赤色浴之已疥又可以已胕治胕腫也音符竹水出焉北流注于渭其陽多竹箭箭篠也多蒼玉丹水出焉今所在有丹水東南流注于洛水其中多水玉多人魚如䱱魚四脚有獸焉其狀如豚而白毛大如笄而黑端笄簪屬名曰毫彘狟猪也夾髀有麄豪長數尺能以脊上毫射物亦自為牝牡狟或作豭吳楚呼為鸞猪亦此𩔖也又西百二十里曰浮山多盼水音美目盼兮之盼枳葉而無傷枳刺針也能傷人故名云木蟲居之在樹之中有草焉名曰薰音訓草麻葉而方莖赤華而黑實臭如蘼蕪蘼蕪香草易曰其臭如蘭眉無兩音佩之可以已癘又西七十里曰羭次之山音㬰漆水出焉今漆水出岐山北流注于渭其上多棫橿棫白桵也音域其下多竹箭其陰多赤銅其陽多嬰垣之玉垣或作短或作根或作埋傳寫謬錯未得其詳有獸焉其狀如禺而長臂善投其名曰囂亦在畏獸畫中似獼猴投擲也有鳥焉其狀如梟人面而一足曰槖􅖦音肥冬見夏蟄服之不畏雷著其毛羽令人不畏天雷也或作災又西百五十里曰時山無草木逐或作遂水出焉北流注于渭其中多水玉又西百七十里曰南山上多丹粟丹水出焉北流注于渭獸多猛豹猛豹似熊而小毛淺有光澤能食蛇食銅鐵出蜀中豹或作虎鳥多尸鳩尸鳩布榖𩔖也或曰鶘鸇也鳩或作丘又西百八十里曰大時之山上多榖柞柞櫟下多杻橿陰多銀陽多白玊涔水出焉音潛北流注于渭清水出焉南流注于漢水今河内脩武縣縣北黑山亦出清水又西三百二十里曰嶓冢之山今在武都氐道縣南嶓音波漢水出焉而東南流注于沔至江夏安陸縣江即沔水囂水出焉北流注于湯水或作陽其上多桃枝鈎端鈎端桃枝屬獸多犀兕熊羆羆似熊而黄白色猛憨能拔樹鳥多白翰赤鷩白翰白鵫也亦名鵫雉又曰白雉有草焉其葉如蕙蕙香草蘭屬也或以蕙為薰葉失之音惠其本如桔梗本根也黑華而不實名曰蓇蓉爾雅釋草曰榮而不實謂之蓇音骨食之使人無子又西三百五十里曰天帝之山上多㯶柟下多菅蕙菅茅𩔖也有獸焉其狀如狗名曰谿或作谷邊或作遺席其皮者不蠱有鳥焉其狀如鶉黑文而赤翁翁頭下毛音汲甕之甕名曰櫟音沙礫之礫食之已痔有草焉其狀如葵其臭如蘼蕪名曰杜衡香草也可以走馬帶之令人便馬或曰馬得之而健走食之已癭西南三百八十里曰臯塗之山薔音色或作蕢又作葍水出焉西流注于諸資之水塗水出焉南流注于集獲之水其陽多丹粟其陰多銀黄金其上多桂木有白石焉其名曰礜可以毒鼠今礜石殺鼠音豫𧖟食之而肥有草焉其狀如槀苃槀苃香草其葉如葵而赤背名曰無條可以毒鼠有獸焉其狀如鹿而白尾馬足人手前兩脚似人手而四角名曰􅙱如音猳􅙱之嬰有鳥焉其狀如䲭而人足名曰數斯食之已癭或作癎又西百八十里曰黄山今始平槐里縣有黄山上故有宫漢惠帝所起疑非此無草木多竹箭盼水出焉音美目盼兮之盼西流注于赤水其中多玉有獸焉其狀如牛而蒼黑大目其名曰􅣕音敏有鳥焉其狀如鴞青羽赤喙人舌能言名曰鸚䳇鸚䳇舌似小兒舌脚指前後各兩扶南徼外出五色者亦有純赤白者大如鴈也又西二百里曰翠山其上多㯶柟其下多竹箭其陽多黄金玉其陰多旄牛麢麝麢似羊而大角細食好在山崖間麝似獐而小有香其鳥多鸓音壘其狀如鵲赤黑而兩首四足可以禦火又西二百五十里曰騩山音巍一音隗囂之隗是錞于西海錞猶堤埻也音章閏反無草木多玉淒水出焉或作浽西流注于海其中多采石黄金采石石有采色者今雌黄空青綠碧之屬多丹粟凡西經之首自錢來之山至于隗山凡十九山二千九百五十七里華山冢也冢者神鬼之所舍也其祠之禮太牢牛羊豕為太牢羭山神也祠之用燭或作煬齋百日以百犧牲純色者為犧瘞用百瑜瑜亦美玉名音臾湯或作温其酒百樽温酒令熱嬰以百珪百璧嬰謂陳之以環祭也或曰嬰即古罌字謂盂也徐州云穆天子傳曰黄金之嬰之屬也其餘十七山之屬皆毛牷用一羊祠之牷謂牲體全具也左傳曰牷牲肥腯者也燭者百草之未灰白蓆采等純之純緣也五色純之等差其文綵也周禮莞席紛純西次二經之首曰鈐山音髠鉗之鉗或作泠又作塗其上多銅其下多玉其木多杻橿西二百里曰㤗或作秦冒之山其陽多金其陰多鐵浴水出焉東流注于河其中多藻玉藻玉玉有符彩者或作柬音練多白蛇水蛇又西一百七十里曰數歴之山其上多黄金其下多銀其木多杻橿其鳥多鸚䳇楚水出焉而南流注于渭其中多白珠今蜀郡平澤出青珠尸子曰水員折者有珠又西百五十里曰髙山其上多銀其下多青碧碧亦玉𩔖也今越巂㑹稽縣東山出碧雄黄晉大興三年髙平郡界有山崩其中出數千斤雄黄其木多椶其草多竹涇水出焉音經而東流注于渭今涇水出安定朝那縣西井頭山至京兆髙陵縣入渭也其中多磐石書曰泗濱浮磬是也青碧西南三百里曰女牀之山其陽多赤銅其陰多涅石即楚石也楚人名為涅石秦名為羽涅也本草經亦名曰石涅也其獸多虎豹犀兕有鳥焉其狀如翟而五彩文翟似雉而大長尾或作􅣍􅣍鵰屬也名曰鸞鳥見則天下安寧舊說鸞似鷄瑞鳥也周成王時西戎獻之又西二百里曰龍首之山其陽多黄金其陰多鐵苕水出焉東南流注于涇水其中多美玉又西二百里曰鹿臺之山今在上郡其上多白玉其下多銀其獸多㸲牛羬羊白豪豪貆猪也有鳥焉其狀如雄雞而人面名曰鳬徯其名自叫也見則有兵西南二百里曰鳥危之山其陽多磬石其陰多檀楮楮即榖木其中多女牀未詳鳥危之水出焉西流注于赤水其中多丹粟又西四百里曰小次之山其上多白玉其下多赤銅有獸焉其狀如猿而白首赤足名曰朱厭見則大兵一作見則有兵起焉一作見則為兵又西三百里曰大次之山其陽多堊堊似土色甚白音惡其陰多碧其獸多㸲牛麢羊又西四百里曰薰吳之山無草木多金玉又西四百里曰􅂒陽之山音㫖其木多稷柟豫章稷似松有刺細理音即豫章大木似楸葉冬夏青生七年而後復可知也其獸多犀兕虎犳㸲牛犳音之樂反又西二百五十里曰衆獸之山其上多㻬琈之玉其下多檀楮多黄金其獸多犀兕又西五百里曰皇人之山其上多金玉其下多青雄黄即雌黄也或曰空青曽青之屬皇水出焉西流注于赤水其中多丹粟又西三百里曰中皇之山其上多黄金其下多蕙棠彤棠之屬也蕙或作羔又西三百五十里曰西皇之山其陽多金其陰多鐵其獸多麋鹿㸲牛麋大如小牛鹿屬也又西三百五十里曰萊山其木多檀楮其鳥多羅羅是食人羅羅之鳥所未詳也凡西次二經之首自鈐山至于萊山凡十七山四千一百四十里其十神者皆人面而馬身其七神皆人面牛身四足而一臂操杖以行是為飛獸之神其祠之毛用少牢羊猪為少牢也白菅為席其十軰音背神者其祠之毛一雄雞鈐而不糈鈐所用祭器名所未詳也或作思訓祈不糈祠不以米毛采言用雄色雞也西次三經之首曰崇吾之山在河之南北望冢遂山名南望䍃之澤音遥西望帝之搏獸之丘搏或作薄東望䗡音於然反淵有木焉員葉而白柎今江東人呼草木子房為柎音府一曰柎花下鄂音丈夫字或作柎音符赤華而黒理其實如枳食之宜子孫有獸焉其狀如禺而文臂豹虎而善投名曰舉父或作夸父有鳥焉其狀如鳬而一翼一目相得乃飛名曰蠻蠻比翼鳥也色青赤不比不能飛爾雅作鶼鶼鳥也見則天下大水西北三百里曰長沙之山泚水出焉音紫北流注于泑水烏交反又音黝水色黑也無草木多青雄黃又西北三百七十里曰不周之山此山形有缺不周匝處因名云西北不周風自此山出北望諸毗之山臨彼嶽崇之山東望泑澤河水所濳也其源渾渾泡泡河南出崑崙潜行地下至葱嶺出于闐國復分流歧出合而東流注泑澤已復潛行南出于積石山而為中國河也名泑澤即蒲澤一名蒲昌海廣三四百里其水停冬夏不増減去玉門關三百餘里即河之重源所謂潛行也渾渾泡泡水濆湧之聲也衮咆二音爰有嘉果其實如桃其葉如棗黄華而赤柎食之不勞又西北四百二十里曰峚音宻山其上多丹木員葉而赤莖黄華而赤實其味如飴食之不飢丹水出焉西流注于稷澤后稷神所馮因名云其中多白玉是有玉膏其源沸沸湯湯玉膏湧出之貌也河圖玉版曰少室山其上有白玉膏一服即仙矣亦此𩔖也沸音拂黄帝是食是饗所以得登龍於鼎湖而龍蛻也是生𤣥玉言玉膏中又出黑玉也玉膏所出以灌丹木丹木五歲五色乃清言光鮮也五味乃馨言滋香也黃帝乃取峚山之玉榮謂玉華也離騷曰懐琬琰之華英又曰登崑崙兮食玉英汲冢書所謂苕華之玉而投之鍾山之陽以為玉種瑾瑜之玉為良言最善也或作食覲臾兩音堅粟精密說玉理也禮記曰瑱密似粟粟或作栗玉有粟文所謂榖璧也濁澤而有光濁謂潤厚五色發作言符彩互映色王子靈符應曰赤如雞冠黄如蒸栗白如割肪黑如醇漆玉之符彩也以和柔剛言玉協九徳也天地鬼神是食是饗玉所以祈祭者言能動天地感鬼神君子服之以禦不祥今徼外出金剛石石屬而似金有光彩可以刻玉外國人帶之云辟惡氣亦此𩔖也自峚山至于鍾山四百六十里其間盡澤也是多奇鳥怪獸奇魚皆異物焉又西北四百二十里曰鍾山其子曰皷此亦神名名之為鍾山之子耳其𩔖皆見歸藏啓筮其狀如人面而龍身啓筮曰麗山之子青羽人面馬身亦似此狀也是與欽䲹音邳殺葆江于崑崙之陽葆或作祖帝乃戮之鍾山之東曰􅳿音遥崖欽䲹化為大鶚鶚鵰屬也音鄂其狀如鵰而黑文白首赤喙而虎爪其音如晨鵠晨鵠鶚屬猶云晨鳬耳說苑曰緤吠犬比奉晨鳬也見則有大兵皷亦化為鵕鳥音俊其狀如鴟赤足而直喙黄文而白首其音如鵠見則其邑大旱穆天子傳云鍾山作舂字音同耳穆王北升此山以望四野曰鍾山是惟天虎下之髙山也百獸之所聚飛鳥之所栖也爰有赤豹白白鳥青鵰執犬羊食豕鹿穆王五日觀于鍾山乃為銘迹於𤣥圃之上以詔後世又西百八十里曰泰器之山觀水出焉西流注于流沙是多文鰩魚音遥狀如鯉魚魚身而鳥翼蒼文而白首赤喙常行西海遊於東海以夜飛其音如鸞雞鸞雞鳥名未詳也或作欒其味酸甘食之已狂見則天下大穰豐穰收熟也韓子曰穰嵗之秋又西三百二十里曰槐江之山丘時之水出焉而北流注于泑水其中多蠃母即䗱螺也其上多青雄黃多藏琅玕黄金玉琅玕石似珠者藏猶𨼆也郎干二音其陽多丹粟其陰多采黄金銀實惟帝之平圃即𤣥圃也穆天子傳曰乃為銘迹於𤣥圃之上謂刋石紀功徳如秦皇漢武之為者也神英招司之司主也招音韶其狀馬身而人面虎文而鳥翼狥于四海狥謂周行也其音如橊音畱或作籕此所未詳也南望崑崙其光熊熊其氣魂魂皆光氣炎盛相焜燿之貌西望大澤后稷所潛也后稷生而靈知及其終化形遯此澤而為之神亦猶傅說騎箕尾也其中多玉其陰多榣木之有若榣木大木也言其上復生若木大木之竒靈者為若見尸子國語曰榣木不生花也北望諸毗山名槐鬼離侖居之離侖其神名鷹鸇之所宅也鸇亦鴟屬也莊周曰鴟鴉甘鼠穆天子傳云鍾山上有白鳥青雕皆此族𩔖也東望恒山四成成亦重也爾雅云再成曰英也有窮鬼居之各在一搏搏猶脅也言羣鬼各以𩔖聚處山四脅有窮其㹅號耳搏一作摶爰有滛水其清洛洛水留下之貌也滛音遥也有天神焉其狀如牛而八足二首馬尾其音如勃皇勃皇未詳見則其邑有兵西南四百里曰崑崙之丘是實惟帝之下都天帝都邑之在下者也穆天子傳曰吉日辛酉天子升于崑崙之丘以觀黃帝之宫而封豐隆之葬以詔後世言増封於崑崙山之上神陸吾司之即肩吾也莊周曰肩吾得之以處大山也其神狀虎身而九尾人面而虎爪是神也司天之九部及帝之囿時主九城之部界天帝苑囿之時節也有獸焉其狀如羊而四角名曰土塿是食人有鳥焉其狀如蜂大如鴛鴦名曰欽原欽或作爰或作至也蠚鳥獸則死蠚木則枯有鳥焉其名曰鶉鳥是司帝之百服服器服也一曰服事也或作藏有木焉其狀如棠棠梨也華黄赤實其味如李而無核名曰沙棠可以禦水食之使人不溺言體浮輕也沙棠為木不可得沉吕氏春秋曰果之美者沙棠之實銘曰安得沙棠刻以為舟泛彼滄海以遨以遊有草焉名曰薲草音頻其狀如葵其味如葱食之已勞吕氏春秋曰菜之美者崑崙之蘋河水出焉出山東北隅也而南流東注于無逹山名赤水出焉出山東南隅也而東南流注于氾天之水氾天亦山名赤水所窮也穆天子傳曰遂宿于崑崙之側赤水之陽陽水北也氾浮劒反洋水出焉出山西北隅或作清而西南流注于醜塗之水醜塗亦山名也皆在南極穆天子傳曰戊辰濟洋水又曰觴天子洋水也黑水出焉亦出西北隅也而西流于大杅山名也穆天子傳曰乃封長肱于黑水之西河是惟崑崙鴻鷺之上以為周室主杅音于是多怪鳥獸謂有一獸九首有一鳥六首之屬也又西三百七十里曰樂游之山桃水出焉西流注于稷澤是多白玉其中多䱻魚音滑其狀如蛇而四足是食魚西水行四百里曰流沙二百里至于蠃母之山神長乗司之是天之九徳也九徳九氣所生其神狀如人而犳之藥反尾其上多玉其下多靑石而無水又西三百五十里曰玉山是西王母所居也此山多玉石因以名云穆天子傳謂之羣玉之山見其山河無險四徹中繩先王之所謂策府寡草木無鳥獸穆王於是攻其玉石取玉石版三乗玉器服物載玉萬隻以歸雙玉為㲄半㲄為隻西王母其狀如人豹尾虎齒而善嘯蓬髮戴勝蓬頭亂髪勝玉勝也音龎是司天之厲及五殘主知災厲五刑殘殺之氣也穆天子傳曰吉日甲子天子賓于西王母執𤣥圭白璧以見西王母獻錦組百縷金玉百斤西王母再拜受之乙丑天子觴西王母于瑶池之上西王母為天子謡曰白雲在天山陵自出道里悠逺山川間之將子無死尚復能來天子畣之曰予還東土和理諸夏萬民均平吾顧見汝比及三年將復而野西王母又為天子吟曰徂彼西土爰居其所虎豹為羣鳥鵲與處嘉命不遷我惟帝女彼何世民又將去子吹笙鼓簧中心翺翔世民之子惟天之望天子遂驅升于奄山乃紀迹于奄山之石而樹之槐眉曰西王母之山奄山即崦嵫山也案竹書穆王五十七年西王母來見賔于昭宫舜時西王母遣使獻玉環見禮三朝有獸焉其狀如犬而豹文其角如牛或作羊其名曰狡其音如吠犬見則其國大禳晉太康七年邵陵扶夷縣檻得一獸狀如豹文有二角無前兩脚時人謂之狡疑非此有鳥焉其狀如翟而赤名曰胜遇音姓是食魚其音如録音緑義未詳見則其國大水又西四百八十里曰軒轅之丘無草木黄帝居此丘娶西陵氏女因號軒轅丘洵水出焉音詢南流注于黒水其中多丹粟多青雄黄又西三百里曰積石之山其下有石門河水冒以西流冒猶覆也積石山今在金城河門關西南羌中河水行塞外東入塞内是山也萬物無不有焉水經引山海經云積石山在鄧林山東河所入也又西二百里曰長留之山其神白帝少昊居之少昊金天氏帝摯之號也其獸皆文尾或作長其鳥皆文首文或作長是多文玉石實惟員神磈氏之宫音隗是神也主司反景日西入則景反東照主司察之又西二百八十里曰章莪之山無草木多瑶碧碧亦玉屬所為甚怪多有非常之怪有獸焉其狀如赤豹五尾一角其音如擊石其名如猙京氏易義曰音如石相擊音静有鳥焉其狀如鶴一足赤文青質而白喙名曰畢方其鳴自叫也見則其邑有譌火譌亦妖訛字又西三百里曰陰山濁浴之水出焉而西流注于蕃澤其中多文貝餘泉蚳之𩔖也見爾雅有獸焉其狀如狸或作豹而白首名曰天狗其音如榴榴或作猫猫可以禦凶又西二百里曰符愓之山音陽其上多椶柟下多金玉神江疑居之是山也多怪雨風雲之所出也又西二百二十里曰三危之山今在燉煌郡尚書云竄三苗于三危是也三青鳥居之是山也廣員百里三青鳥主為西王母取食者别自棲息於此山也竹書曰穆王西征至于青鳥所解也其上有獸焉其狀如牛白身四角其毫如披蓑蓑辟雨之衣也音梭其名曰􅀈􅀈傲噎二音是食人有鳥焉一首而三身其狀如􅣍其名曰䲭􅣍似雕黒文赤頸音洛下句或云扶狩則短扶木則枯應在上欽原下脫錯在此耳又西一百九十里曰騩山其上多玉而無石神耆童居之耆童老童顓頊之子其音常如鐘磬其下多積蛇又西三百五十里曰天山多金玉有青雄黄英水出焉而西南流注于湯谷有神焉其狀如黄囊赤如丹火體色黄而精光赤也六足四翼渾敦無面目是識歌舞實惟帝江也夫形無全者則神自然靈照精無見者則闇與理㑹其帝江之謂乎莊生所云中央之帝混沌為儵忽所鑿七竅而死者蓋假此以寓言也又西二百九十里曰泑山泑音黝黒之黝神蓐收居之亦金神也人面虎爪白尾執鉞見外傳云其上多嬰短之玉未詳其陽多瑾瑜之玉其陰多青雄黄是山也西望日之所入其氣員日形員故其氣象亦然也神紅光之所司也未聞其狀西水行百里至于翼望之山或作土翠山無草木多金玉有獸焉其狀如狸一目而三尾名曰讙讙音歡或作原其音如奪百聲言其能作百種物聲也或曰奪百物名亦所未詳是可以禦凶服之已癉黄癉病也音旦有鳥焉其狀如烏三首六尾而善笑名曰鵸䳜猗餘兩音服之使人不厭不厭夢也周書曰服者不昩音莫禮反或曰􅀈􅀈目也又可以禦凶凡西次三經之首崇吾之山至于翼望之山凡二十三山六千七百四十四里其神狀皆羊身人面其祠之禮用一吉玉瘞玉加采色者也尸子曰吉玉大龜糈用稷米西次四經之首曰陰山上多榖無石其草多茆蕃茆􅝀葵也蕃青蕃似莎而大夘煩兩音陰水出焉西流注于洛北五十里曰勞山多茈草一名茈䓞中染紫也弱水出焉而西流注于洛西五十里曰罷父之山洱水出焉音耳而西流注于洛其中多茈碧北百七十里曰申山其上多榖柞其下多杻橿其陽多金玉區水出焉而東流注于河北二百里曰鳥山其上多桑其下多楮其陰多鐵其陽多玊辱水出焉而東流注于河又北百二十里曰上申之山上無草木而多硌石硌磊硌大石貌也音洛下多榛楛榛子似栗而小味美楛木可以為箭詩云榛楛濟濟臻怙兩音其獸多白鹿其鳥多當扈或作尸其狀如雉以其髯飛髯咽下須毛也食之不眴目音眩湯水出焉東流注于河又北百八十里曰諸次之山諸次之水出焉而東流注于河是山也多木無草鳥獸莫居是多衆蛇又北百八十里曰號山其木多漆㯶漆樹似樗也其草多葯䖀芎藭葯白芷别名䖀香草也芎藭一名江蘺葯音鳥較反多汵石汵或作金未詳端水出焉而東流注于河又北二百二十里曰盂山音于其陰多鐵其陽多銅其獸多白狼白虎外傳曰周穆王伐犬戎得四白狼白虎虎名甝􅂒其鳥多白雉白翟或作白翠生水出焉而東流注于河西二百五十里曰白於之山上多松栢下多櫟檀櫟即柞其獸多㸲牛羬羊其鳥多鴞鴞似鳩而青色洛水出于其陽而東流注于渭夾水出于其陰東流注于生水西北三百里曰申首之山無草木冬夏有雷申水出于其上潛于其下是多白玉又西五十五里曰涇谷之山或無之山二字涇水出焉或以此為今涇水未詳東南流注于渭是多白金白玉又西百二十里曰剛山多柒木多㻬琈之玉剛水出焉北流注于渭是多神􅀈􅀈亦魑魅之𩔖也音耻囘反或作􅀈其狀人面獸身一足一手其音如欽欽亦吟字假音又西二百里至剛山之尾洛水出焉而北流注于河其中多蠻蠻其狀鼠身而鼈首其音如吠犬又西三百五十里曰英鞮之山上多漆木下多金玉鳥獸盡白涴水出焉涴或作􅀈音寃枉之寃而北注于陵羊之澤是多冉遺之魚魚身蛇首六足其目如馬耳食之使人不眯可以禦凶又西三百里曰中曲之山其陽多玉其陰多雄黃白玉及金有獸焉其狀如馬而白身黑尾一角虎牙爪音如皷音其名曰駮是食虎豹爾雅說駮不道有角及虎爪駮亦在畏狩畫中可以禦兵養之辟兵刃也有木焉其狀如棠而員葉赤實實大如木𤓰木𤓰如小𤓰名曰櫰木音懷食之多力尸子曰木食之人多為仁者名為若木此之𩔖又西二百六十里曰邽山音圭其上有獸焉其狀如牛蝟毛名曰窮奇音如獋狗是食人或云似虎蝟毛有翼銘曰窮奇之獸厥形甚醜馳逐妖邪莫不犇走是以一名號曰神狗濛水出焉音蒙南流注于洋水其中多黄貝貝甲虫肉如科斗但有頭尾耳蠃魚音螺魚身而鳥翼音如鴛鴦見則其邑大水又西二百二十里曰鳥鼠同穴之山今在隴西首陽縣西南山有鳥鼠同穴鳥名曰䳜鼠名曰鼵鼵如人家鼠而短尾䳜似燕而黃色穿地入數尺鼠在内鳥在外而共處孔氏尚書傳曰共為雌雄張氏地理記云不為牝牡也其上多白虎白玉渭水出焉而東流注于河出山東至𢎞農華陰縣入河其中多鰠魚音騷其狀如鱣魚鱣魚大魚也口在頷下體有連甲也或作鮎鯉動則其邑有大兵或脫無從動則以下語者濫水出于其西音檻西流注于漢水多􅛈魮之魚如玭兩音其狀如覆銚鳥首而魚翼魚尾音如磬石之聲是生珠玉亦珠母蚌𩔖而能生出之西南三百六十里曰崦嵫之山日没所入山也見離騷奄兹兩音其上多丹木其葉如榖其實大如𤓰赤符而黑理食之已癉可以禦火其陽多龜其陰多玉苕或作若水出焉而西流注于海禹大傳曰洧盤之水出崦嵫山其中多砥礪磨石也精為砥麄為礪也有獸焉其狀馬身而鳥翼人面蛇尾是好舉人喜抱舉人名曰孰湖有鳥焉其狀如鴞而人面蜼身犬尾蜼獼猴屬也音贈遺之遺一音誄見中山經尾又作眥其名自號也或作設設亦呼耳疑此脫誤見則其邑大旱凡西次四經自陰山以下至於崦嵫之山凡十九山三千六百八十里其祠祀禮皆用一白鷄祈糈以稻米白菅為席右西經之山志凡七十七山一萬七千五百一十七里山海經卷二
