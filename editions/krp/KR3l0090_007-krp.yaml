body:
  text: 山海經卷七晉郭璞撰海外西經海外自西南陬至西北陬者滅蒙鳥在結匈國北為鳥青赤尾大運山高三百仭在滅蒙鳥北大樂之野夏后啓於此儛九代九代馬名儛謂盤作之令舞也乘兩龍雲葢三層層猶重也左手操翳羽葆􅀈也右手操環玉空邊等為環佩玉璜半璧曰璜在大運山北歸藏鄭母經曰夏后啓筮御飛龍登於天吉明啓亦仙也一曰大遺之野大荒經云大穆之野三身國在夏后啓北一首而三身一臂國在其北一臂一目一鼻孔有黄馬虎文一目而一手竒肱之國肱或作𢎞竒音羈在其北其人一臂三目有隂有陽乘文馬隂在上陽在下文馬即言良也有鳥焉兩頭赤黄色在其旁其人善為機巧以取百禽能作飛車從風逺行湯時得之於豫州界中即壊之不以示人後十年西風至復作遣之形天與帝至此争神帝斷其首𦵏之常羊之山乃以乳為目以臍為口操干戚以舞干盾戚斧也是為無首之民女祭女戚在其北居兩水間戚操魚䱉鱓魚屬祭操爼肉几䳐鳥􅦵鳥次瞻兩音其色青黄所經國亡此應祸之鳥即今梟鵂鶹之𩔖在女祭北䳐鳥人面居山上一曰維鳥青鳥黄鳥所集丈夫國在維鳥北其為人衣冠帶劔殷帝太戊使王孟採藥從西王母至此絶粮不能進食木實衣木皮終身無妻而生二子從形中出其父即死是為丈夫民女丑之尸生而十日炙殺之在丈夫北以右手鄣其靣蔽面十日居上女丑居山之上巫咸國在女丑北右手操青蛇左手操赤蛇在登葆山羣巫所從上下也採藥徃來并封在巫咸東其狀如彘前後皆有首黑今弩弦蛇亦此𩔖也女子國在巫咸北兩女子居水周之有黄池婦人入浴出即懐姙矣若生男子三歳輒死周猶繞也離騷日水周於堂下也一曰居一門中軒轅之國在此窮山之際其不壽者八百歳其國在山南邉也大荒經曰岷山之南在女子國北人靣蛇身尾交首上窮山在其北不敢西射畏軒轅之丘言敬畏黄帝威靈故不敢向西而射也在軒轅國北其丘方四蛇相繞繚繞樛纒此諸夭之野夭音妖鸞鳥自歌鳯鳥自舞鳯皇卵民食之甘露民飲之所欲自從也言滋味無所不有所願得自在此謂夭野也百獸相與羣居在四蛇北其人兩手操卵食之兩鳥居前導之龍魚陵居在其北狀如狸或曰龍魚似狸一角一曰蝦音遐即有神聖乘此以行九野九域之野一曰鼈魚鼈音惡横也在夭野北其為魚也如鯉白民之國在龍魚北白身被髪言其人體洞白有乘黄其狀如狐其背上有角乘之壽二千歳周書曰白民乘黄似狐背上有兩角即飛黄也淮南子曰天下有道飛黄伏皂肅慎之國在白民北有𣗳名曰雄或作雒常先入伐帝於此取之其俗無衣服中國有聖帝代立者則此木生皮可衣也長股之國在雄常北被髪國在赤水東也長臂人身如中人而臂長二丈以𩔖推之則此人脚過三丈矣黄帝時至或曰長脚人常負長臂人入海中捕魚也一曰長脚或曰有喬國今伎家喬人盖𧰼此身西方蓐收左耳有蛇乘兩龍金神也人靣虎爪白毛執鉞見外傳山海經卷七
