body:
  text: 山海經卷十一晉郭璞撰海内西經海内西南陬以北者貳負之臣曰危危與貳負殺窫窳帝乃梏之疏屬之山梏猶繋縳也古沃切桎其右足桎戒也反縛兩手與髪并髪合縛之也繋之山上木在開題西北漢宣帝使人上郡發盤石石室中得一人蹝裸被髪反縛械一足以問羣臣莫能知劉子政按此言對之宣帝大驚於是時人爭學山海經矣論者多以為是其尸象非真體也意者以靈怪變化論難以理測物禀異氣出于不然不可以常運推不可以近數揆矣魏時有人發故周王冢者得殉女子不死不生數日時有氣數月而能語狀如廿許人送詣京師郭太后愛養之恒在左右十餘年太后崩此女哀思哭泣一年餘而死即此𩔖也大澤方百里羣鳥所生及所解百鳥於此生乳解之毛羽在鴈門北鴈門山鴈出其間在髙柳北髙柳在代北后稷之𦵏山水環之在廣都之野在氐國西流黄酆氏之國中方三百里言國城内有塗四方塗道中有山在后稷𦵏西流沙出鍾山西行又南行崑崙之墟西南入海黑水之山今西海居延澤尚書所謂流沙者形如月生五日也東胡在大澤東夷人在東胡東貊國在漢水東北今扶餘國即濊貊故地在長城北去𤣥菟千里出名馬赤玉貂皮大珠如酸棗也地近于燕滅之孟鳥亦鳥名也在貊國東北其鳥文赤黄青東鄉海内崑崙之墟在西北言海内者明海外復有崑崙山帝之下都崑崙之墟方八百里髙萬仭皆謂其墟基廣輪之高庳耳自此以上二千五百餘里上有醴泉華池去嵩髙五萬里葢天地之中也見禹本紀上有木禾長五尋大五圍木禾榖𩔖也生黒水之阿可食見穆天子傳面有九井以玉為檻檻欄面有九門門有開眀獸守之百神之所在在八隅之巖在巖間也赤水之際非仁羿莫能上岡之巖言非仁人及有才藝如羿者不能得登此山之岡嶺巉巖也羿嘗請藥西王母亦言其得道也羿一或作聖赤水出東南隅以行其東北西南流注南海厭火東河水出東北隅以行其北西南又入渤海又出海外即西而北入禹所導積石山禹治水復决疏出之故云導河積石洋音翔水黑水出西北隅以東東行又東北南入海羽民南弱水青水出西南隅以東又北又西南過畢方鳥東西域傳烏弋國去長安萬五千餘里西行可百餘日至條枝國臨西海長老傳聞有弱水西王母云東夷傳亦曰長城外數千里亦有弱水皆所未見也淮南子云弱水出窮石窮石今之西郡再葢其𣲖别之源耳崑崙南淵深三百仭靈淵開明獸身大𩔖虎而九首皆人面東嚮立崑崙上天獸也銘曰開明為獸禀資乾精瞪視崑崙威振百靈開明西有鳯凰鸞鳥皆戴蛇踐蛇膺有赤蛇開明北有視肉珠𣗳文玉𣗳五彩玉𣗳玗琪𣗳玗琪赤玉屬也吳天璽元年臨海郡吏伍曜在海水際得石𣗳髙二尺餘莖葉紫色詰曲傾靡有光彩即玉𣗳之𩔖也于其兩音不死樹言長生也鳯凰鸞鳥皆戴􅀈音戈盾也又有離朱木木栢𣗳甘水即醴泉也聖木食之令人智聖也曼兌未詳一曰挺木牙交淮南作璇𣗳璇玉𩔖也開明東有巫彭巫抵巫陽巫履巫凡巫相皆神醫也世本曰巫彭作醫楚詞曰帝告巫陽夾窫窳之尸皆操不死之藥以距之為距却死氣求更生窫窳者蛇身人面貳負臣所殺也服常𣗳其上有三頭人伺琅玕𣗳服常木未詳琅玕子似珠爾雅曰西北之美者有崑崙之琅玕焉莊周曰有人三頭遞卧遞起以伺琅玕與玗琪子謂此人也開明南有𣗳鳥六首蛟蛟似蛇四脚龍𩔖也蝮蛇蜼豹鳥秩𣗳木名未詳於表池𣗳木言列𣗳以表池即華池也誦鳥鳥名形未詳鶽鵰也穆天子傳曰爰有白鷄青鵰音竹荀之筍視肉山海經卷十一
