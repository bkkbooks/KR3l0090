body:
  text: 山海經卷九晉郭璞撰海外東經海外自東南陬至東北陬者􅜚丘音嗟或作髪爰有遺玉青馬視肉楊柳甘柤甘華甘果所生在東海兩山夾丘上有𣗳木一曰嗟丘一曰百果所在在堯𦵏東大人國在其北為人大坐而削船一曰在􅜚丘北奢比之尸在其北亦神名也獸身人面大耳珥兩青蛇珥以蛇貫耳也音釣餌之餌一曰肝榆之尸在大人北君子國在其北衣冠帶劔食獸使二大虎在旁其人好讓不爭有薰或作堇華草朝生夕死一曰在肝榆之尸北蚩蚩在其北音虹各有兩首虹螮蝀也一曰在君子國北朝陽之谷神曰天呉是為水伯在蚩蚩北兩水間其為獸也八首人面八足八尾皆青黄大荒東經作十尾青丘國在其北其人食五榖衣絲帛其狐四足九尾一曰在朝陽北汲郡竹書曰栢抒子征於東海及三夀得一狐九尾即此𩔖也帝命竪亥歩自東極至於西極五億十選竪亥健行人選萬也九千八百步竪亥右手把算左手指青丘北一曰禹令竪亥一曰五億十萬九千八百歩詩含神霧曰天地東西二億三萬三千里南北二億一千五百里天地相去一億五萬里黒齒國在其北東夷傳曰倭國東四十餘里有裸國裸國東南有黒齒國船行一年可至也異物志云西屠染齒亦以倣北人為人黑食稻啖蛇一赤一青一作一青蛇在其旁一曰在竪亥北為人黑手食稻使蛇其一蛇赤下有湯谷谷中水熱也湯谷上有扶桑扶桑木也十日所浴在黒齒北居水中有大木九日居下枝一日居上枝莊周云昔者十日並出草木焦枯淮南子亦云堯乃令羿射十日中其九日日中烏盡死離騷所謂羿焉畢日烏焉落羽者也歸藏鄭母經云昔者羿善射畢十日果畢之汲郡竹書曰𦙍甲即位居西河有妖孽十日並出明此自然之異有自來矣傳曰天有十日日之數十此云九日居下枝一日居上枝大荒經又云一日方至一日方出明天地雖有十日自使以次第迭出運照而今俱見為天下妖災故羿稟堯之命洞其靈誠仰天控弦而九日潛退也假令器用可以激水烈火精盛可以降霜囘景然則羿之鑠明離而斃陽烏未足為難也若搜之常情則無理矣然推之以數則無徃不通逹觀之客宜領其𤣥致歸之𡨕會則逸義無滯言竒不廢矣雨師妾在其北雨師謂屏翳也其為人黑兩手各操一蛇左耳有青蛇右耳有赤蛇一曰在十日北為人黑身人靣各操一龜𤣥股之國在其北髀以下盡黑故云其為人衣魚以魚皮為衣也食䳼䳼水鳥也音憂使兩鳥夾之一曰在雨師妾北毛民之國在其北為人身生毛今去臨海郡東南二千里有毛人在大海州島上為人短小面體盡有毛如猪能穴居無衣服晋永嘉四年吳郡司鹽都尉戴逢在海邊得一船上有男女四人狀皆如此言語不通送詣丞相府未至道死唯有一人在上賜之婦生子出入市井漸曉人語自說其所在是毛民也大荒經云毛民食黍者是矣一曰在𤣥股北勞民國在其北其為人黑食果草實也有一鳥兩頭或曰教民一曰在毛民北為人靣目手足盡黑東方勾芒鳥身人面乘兩龍木神也方面素服墨子曰昔秦穆公有明徳上帝使勾芒賜之壽十九年山海經卷九
