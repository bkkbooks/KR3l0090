body:
  text: 山海經卷十晉郭璞撰海内南經海内東南陬以西者從南頭起之也甌居海中今臨海司寧縣即東甌在岐海中也音嘔閩在海中音旻其西北有山閩越即西甌今建安郡是也亦在岐海中一曰閩中山在海中三天子鄣山音章在閩西海北今在新安歙縣東今謂之三王山浙江出其邊也張氏土地記曰東陽永康縣南四里有石城山上有小石城云黄帝曾逰此即三天子都也一曰在海中桂林八𣗳在番隅東八𣗳而成林言其大也番隅今番隅縣伯慮國未詳離耳國鎪離其耳分令下垂以為飾即儋耳也在朱崖海渚中不食五榖但噉蚌及藷藇也彫題國㸃湼其面畵體為鱗采即鮫人也北朐國音劬未詳皆在鬰水南鬰水出湘陵南海一曰相慮梟陽國在北朐之西其為人人面長唇黒身有毛反踵見人笑亦笑左手操管周書曰州靡髣髴者人身反踵自笑笑則上唇掩其面爾雅云髣髴大傳曰周書成王時州靡國獻之海内經謂之贛巨人今交州南康郡深山中皆有此物也長丈許脚跟反向健走被髪好笑雌者能作汁酒中人即病土俗呼為山都南康今有贑水以有此人因以名水猶大荒說地有蜮人人因號其山為蜮山亦此𩔖也兕在舜塟東湘水南其狀如牛蒼黑一角蒼梧之山帝舜𦵏於陽即九疑山也禮記亦曰舜𦵏蒼梧之野帝丹朱𦵏於隂今丹陽復有丹朱冡也竹書亦曰后稷放帝朱於丹水與此義符丹朱稱帝者猶漢山陽公死加獻帝之諡也汜林方三百里在狌狌東或作猩猩字同耳狌狌知人名其為獸如豕而人面周書曰鄭郭狌狌者狀如黄狗而人面頭如雄雞食之不眯今交州封溪出狌狌土俗人說云狀如勝而腹如狗聲如小兒啼也在舜𦵏西狌狌西北有犀牛其狀如牛而黒犀牛似水牛猪頭在狌狌知人名之西北庳脚三角夏后啓之臣曰孟涂是司神於巴人聽其獄訟為之神主請訟於孟涂之所令斷之也其衣有血者乃執之不直者則血見於衣是請生言好生也居山上在丹山西丹山在丹陽南丹陽居属也今建平郡丹陽城秭歸縣東七里即孟涂所居也窫窳龍首居弱水中在狌狌知人名之西其狀如龍首食人窫窳本蛇身人面為貳負臣所殺復化而成此物也有木其狀如牛河圖玉版說芝草𣗳生或如車馬或如龍蛇之狀亦此𩔖也引之有皮若纓黄蛇言牽之皮剥如人冠纓及黄蛇狀也其葉如羅如綾羅也其實如欒欒木名或作卵或作麻黄本赤枝青葉生雲雨山音樂其木若蓲蓲亦木名未詳其名曰建木在窫窳西弱水上建木青葉紫莖黒花黄實其下聲無響立無影也氐人國音觸抵之抵在建木西其為人人面而魚身無足盖胷以上人胷以下魚也巴蛇食𧰼三歳而出其骨君子服之無心腹之疾今南方蚺蛇吞鹿鹿已爛自絞於𣗳腹中骨皆穿鱗甲間出此其𩔖也楚詞曰有蛇吞象厥大何如說者云長千尋其為蛇青黄赤黑一曰黑蛇青首在犀牛西旄馬其狀如馬四節有毛穆天子傳所謂毫馬者亦有旄牛在巴蛇西北髙山南匈奴一曰獫狁開題之國音提列人之國並在西北三國並在旄馬西北山海經卷十
