body:
  text: 山海經卷六晉郭璞撰海外南經地之所載六合之間四方上下為六合也四海之内照之以日月經之以星辰紀之以四時要之以太歳神靈所生其物異形或夭或壽唯聖人能通其道言自非窮理盡性者則不能原極其情變海外自西南陬至東南陬者陬猶隅也音騶結匈國在其西南其為人結匈臆前胅出如人結㗋也南山在其東南自此山來蟲為蛇蛇號為魚以蟲為蛇以蛇為魚一曰南山在結匈東南比翼鳥在其東其為鳥青赤似鳬兩鳥比翼一曰在南山東羽民國在其東南其為人長頭身生羽能飛不能逺卵生畫似仙人也一曰在比翼鳥東南其為人長頰啓筮曰羽民之状鳥喙赤目而白首有神人二八連臂為帝司夜於此野晝𨼆夜見在羽民東其為人小頰赤肩當脾上正赤也盡十六人疑此後人所增益語耳畢方鳥在其東青水西其為鳥人面一脚一曰在二八神東讙頭國在其南其為人人面有翼鳥喙方捕魚讙兠堯臣有罪自投南海而死帝憐之使其子居南海而祠之畫亦似仙人也一曰在畢方東或曰讙朱國厭火國在其國南獸身黒色生火出其口中言能吐火畫似獮猴而黒色也一曰在讙朱東三株樹在厭火北生赤水上其為𣗳如栢葉皆為珠一曰其為𣗳若彗如彗星状三苖國在赤水東其為人相隨昔堯以天下讓舜三苖之君非之帝殺之有苖之民叛入南海為三苖國一曰三毛國臷國在其東音秩亦音替其為人黄能操弓射蛇大荒經云此國自然有五穀衣服一曰臷國在三毛東貫匈國在其東其為人匈有竅尸子曰四夷之民有貫匈者有深目者有長肱者黄帝之徳常致之異物志曰穿匈之國去其衣則無自然者蓋似效此貫匈人也一曰在臷國東交脛國在其東其為人交脛言脚脛曲戾相交所謂雕題交趾者也或作頸其為人交頸而行也一曰在穿匈東不死民在其東其為人黒色壽不死有員丘山上有不死𣗳食之乃壽亦有赤泉飲之不老一曰在穿匈國東岐舌國在其東其人舌皆岐或云支舌也一曰在不死民東崑崙墟在其東墟四方墟山下基也一曰在岐舌東為墟四方羿與鑿齒戰於壽華之野羿射殺之在崑崙墟東羿持弓矢鑿齒持盾鑿齒亦人也齒如鑿長五六尺因以名云一曰戈未詳三首國在其東其為人一身三首一曰在鑿齒東周饒國在其東其為人短小冠帶其人長三尺穴居能為機巧有五榖也一曰焦僥國在三首東外傳云焦僥民長三尺短之至也詩含神霧曰從中州以東西四十萬里得焦僥國人長尺五寸也長臂國在其東捕魚水中兩手各操一魚舊說云其人手下垂至地魏黄初中𤣥菟太守王頎討髙句麗王宫窮追之過沃沮國其東界臨大海近日之所出問其耆老海東復有人否云常在海中得一布褶身如中人衣兩袖長三尺即此長臂人衣也一曰在焦僥東捕魚海中狄山帝堯𦵏於陽吕氏春秋曰堯葬榖林今陽城縣西東阿縣城次鄉中赭陽縣湘亭南皆有堯塚帝嚳𦵏於隂嚳堯父號髙辛今冡在頓丘縣城南臺隂野中也音酷爰有熊羆文虎彫虎也尸子曰中黄伯余左執大行之獶而右搏彫虎也蜼豹蜼獼猴𩔖離朱木名也見莊子今圖作赤烏視肉聚肉形如牛肝有兩目也食之無盡尋復更生如故吁咽所未詳也文王皆𦵏其所今文王墓在長安鄗聚社中按帝王冡墓皆有定䖏而山海經徃徃復見之者葢以聖人久於其位仁化廣及恩洽鳥獸至於殂亡四海若䘮考妣無思不哀故絶域殊俗之人聞天子崩各自立坐而祭醊哭泣起土為冡是以所在有焉亦猶漢氏諸逺郡國皆有天子廟此其遺𧰼也一曰湯山一曰爰有熊羆文虎蜼豹離朱􅀈久􅀈久鴝鶹之屬視肉虖交所未詳也其范林方三百里言林水汜濫布衍也南方祝融獸身人靣乘兩龍火神也山海經卷六
