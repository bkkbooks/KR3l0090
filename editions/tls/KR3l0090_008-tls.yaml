body:
  text: 海外北經第八海外自東北陬至西北陬者無䏿之國在長股東為人無䏿鍾山之神名曰燭陰視為晝暝為夜吹為冬呼為夏不飲不食不息息則為風身長千里在無䏿之東其為物人面蛇身赤色居鍾山下一目國在其東一目中其面而居一曰有手足柔利國在一目東為人一手一足反膝曲足居上一云留利之國人足反折共工之臣曰相柳氏九首以食于九山相柳之所抵厥為澤谿禹殺相柳其血腥不可以樹穀種禹厥之三仞三沮乃以為眾帝之臺在崑崙之北柔利之東相柳者九首人面蛇身而青不敢北射畏共工之臺臺在其東臺四方隅有一蛇虎色首衝南方深目國在其東為人舉一手一目在共工臺東無腸之國在深目東其為人長而無腸聶耳之國在無腸國東使兩文虎為人兩手聶其耳縣居海水中及水所出入奇物兩虎在其東夸父與日逐走入日渴欲得飲飲於河渭河渭不足北飲大澤未至道渴而死棄其杖化為鄧林博父國在聶耳東其為人大右手操青蛇左手操黃蛇鄧林在其東二樹木一曰博父禹所積石之山在其東河水所入拘纓之國在其東一手把纓一曰利纓之國尋木長千里在拘纓南生河上西北跂踵國在拘纓東其為人大兩足亦大一曰大踵歐絲之野在大踵東一女子跪據樹歐絲三桑無枝在歐絲東其木長百仞無枝范林方三百里在三桑東洲環其下務隅之山帝顓頊葬于陽九嬪葬于陰一曰爰有熊羆文虎離朱鴟久視肉平丘在三桑東爰有遺玉青鳥視肉楊柳甘柤甘華百果所生在兩山夾上谷二大丘居中名曰平丘北海內有獸其狀如馬名曰騊駼有獸焉其名曰駮狀如白馬鋸牙食虎豹有素獸焉狀如馬名曰蛩蛩有青獸焉狀如虎名曰羅羅北方禺彊人面鳥身珥兩青蛇踐兩青蛇
