body:
  text: 海內南經第十海內東南陬以西者甌居海中閩在海中其西北有山一曰閩中山在海中三天子鄣山在閩西海北一曰在海中桂林八樹在番隅東伯慮國離耳國彫題國北朐國皆在鬱水南鬱水出湘陵南山一曰相慮梟陽國在北朐之西其為人人面長唇黑身有毛反踵見人笑亦笑左手操管兕在舜葬東湘水南其狀如牛蒼黑一角蒼梧之山帝舜葬于陽帝丹朱葬于陰氾林方三百里在狌狌東狌狌知人名其為獸如豕而人面在舜葬西狌狌西北有犀牛其狀如牛而黑夏后啟之臣曰孟涂是司神于巴巴人請訟于孟涂之所其衣有血者乃執之是請生居山上在丹山西丹山在丹陽南丹陽居屬也窫窳龍首居弱水中在狌狌知人名之西其狀如龍首食人有木其狀如牛引之有皮若纓黃蛇其葉如羅其實如欒其木若蓲其名曰建木在窫窳西弱水上氐人國在建木西其為人人面而魚身無足巴蛇食象三歲而出其骨君子服之無心腹之疾其為蛇青黃赤黑一曰黑蛇青首在犀牛西旄馬其狀如馬四節有毛在巴蛇西北高山南匈奴開題之國列人之國並在西北
