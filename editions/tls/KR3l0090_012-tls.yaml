body:
  text: 海內北經第十二海內西北陬以東者蛇巫之山上有人操柸而東向立一曰龜山西王母梯几而戴勝杖其南有三青鳥為西王母取食在崑崙虛北有人曰大行伯把戈其東有犬封國貳負之尸在大行伯東犬封國曰犬戎國狀如犬有一女子方跪進杯食有文馬縞身朱鬣目若黃金名曰吉量乘之壽千歲鬼國在貳負之尸北為物人面而一目一曰貳負神在其東為物人面蛇身蜪犬如犬青食人從首始窮奇狀如虎有翼食人從首始所食被髮在蜪犬北一曰從足帝堯臺帝嚳臺帝丹朱臺帝舜臺各二臺臺四方在崑崙東北大蠭其狀如蠭朱蛾其狀如蛾蟜其為人虎文脛有䏿在窮奇東一曰狀如人崑崙虛北所有闒非人面而獸身青色據比之尸其為人折頸被髮無一手環狗其為人獸首人身一曰蝟狀如狗黃色𥘯其為物人身黑首從目戎其為人人首三角林氏國有珍獸大若虎五彩畢具尾長於身名曰騶吾乘之日行千里崑崙虛南所有氾林方三百里從極之淵深三百仞維冰夷恒都焉冰夷人面乘兩龍一曰忠極之淵陽汙之山河出其中凌門之山河出其中王子夜之尸兩手兩股胸首齒皆斷異處舜妻登比氏生宵明燭光處河大澤二女之靈能照此所方百里一曰登北氏蓋國在鉅燕南倭北倭屬燕朝鮮在列陽東海北山南列陽屬燕列姑射在海河洲中姑射國在海中屬列姑射西南山環之大蟹在海中陵魚人面手足魚身在海中大鯾居海中明組邑居海中蓬萊山在海中大人之市在海中
