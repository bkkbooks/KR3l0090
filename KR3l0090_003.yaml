body:
  text: 北山經第三北山經之首曰單狐之山多机木其上多華草漨水出焉而西流注于泑水其中多茈石文石又北二百五十里曰求如之山其上多銅其下多玉無草木滑水出焉而西流注于諸毗之水其中多滑魚其狀如鱓赤背其音如梧食之已疣其中多水馬其狀如馬而文臂牛尾其音如呼又北三百里曰帶山其上多玉其下多青碧有獸焉其狀如馬一角有錯其名曰䑏䟽可以辟火有鳥焉其狀如烏五彩而赤文名曰鵸鵌是自為牝牡食之不疽彭水出焉而西流注于芘湖之水其中多儵魚其狀如鷄而赤毛三尾六足四目其音如鵲食之可以已憂又北四百里曰譙明之山譙水出焉西流注于河其中多何羅之魚一首而十身其音如吠犬食之已癰有獸焉其狀如貆而赤豪其音如榴榴名曰孟槐可以禦凶是山也無草木多青雄黃又北三百五十里曰涿光之山囂水出焉而西流注于河其中多鰼鰼之魚其狀如鵲而十翼鱗皆在羽端其音如鵲可以禦火食之不癉其上多松柏其下多椶橿其獸多麢羊其鳥多蕃又北三百八十里曰虢山其上多漆其下多桐椐其陽多玉其陰多鐵伊水出焉西流注于河其獸多橐駝其鳥多寓狀如鼠而鳥翼其音如羊可以禦兵又北四百里至于虢山之尾其上多玉而無石魚水出焉而西流注于河其中多文貝又北二百里曰丹熏之山其上多樗柏其草多韭薤多丹雘熏水出焉而西流注于棠水有獸焉其狀如鼠而兔首麋耳其音如獋犬以其尾飛名曰耳鼠食之不䐆又可以禦百毒又北二百八十里曰石者之山其上無草木多瑤碧泚水出焉而西流注于河有獸焉其狀如豹而文題白身名曰孟極是善伏其鳴自呼又北百一十里曰邊春之山多葱桃葵韭李杠水出焉而西流注于泑澤有獸焉其狀如禺而文身善笑見人則臥名曰幽鴳其鳴自呼又北二百里曰蔓聯之山其上無草木有獸焉其狀如禺而有鬣牛尾文臂馬蹄見人則笑名曰足訾其鳴自呼有鳥焉群居而朋飛其毛如雌雉名曰鵁其名自呼食之已風又北百八十里曰單張之山其上無草木有獸焉其狀如豹而長尾人首而牛耳一目名曰諸犍善吒行則衘其尾居則蟠其尾有鳥焉其狀如雉而文首白翼黃足名曰白鵺食之已嗌痛可以已痸櫟水出焉而南流注于杠水又北三百二十里曰灌題之山其上多樗柘其下多流沙多砥有獸焉其狀如牛而白尾其音如訆名曰那父有鳥焉其狀如雌雉而人面見人則躍名曰竦斯其鳴自呼也匠韓之水出焉而西流注于泑澤其中多磁石又北二百里曰潘侯之山其上多松柏其下多榛楛其陽多玉其陰多鐵有獸焉其狀如牛而四節生毛名曰旄牛邊水出焉而南流注于櫟澤又北二百三十里曰小咸之山無草木冬夏有雪北二百八十里曰大咸之山無草木其下多玉是山也四方不可以上有蛇名曰長蛇其毛如彘豪其音如鼓柝又北三百二十里曰敦薨之山其上多椶柟其下多茈草敦薨之水出焉而西流注于泑澤出于崑崙之東北隅實惟河源其中多赤鮭其獸多兕旄牛其鳥多鳲鳩又北二百里曰少咸之山無草木多青碧有獸焉其狀如牛而赤身人面馬足名曰窫窳其音如嬰兒是食人敦水出焉東流注于鴈門之水其中多䰽䰽之魚食之殺人又北二百里曰獄法之山瀤澤之水出焉而東北流注于泰澤其中多䲃魚其狀如鯉而雞足食之已疣有獸焉其狀如犬而人面善投見人則笑其名山𤟤其行如風見則天下大風又北一百里曰北嶽之山多枳棘剛木有獸焉其狀如牛而四角人目彘耳其名曰諸懷其音如鳴鴈是食人諸懷之水出焉而西流注于囂水其中多鮨魚魚身而犬首其音如嬰兒食之已狂又北百八十里曰渾夕之山無草木多銅玉囂水出焉而西北流注于海有蛇一首兩身名曰肥遺見則其國大旱又北五十里曰北單之山無草木多葱韭又北百里曰羆差之山無草木多馬又北百八十里曰北鮮之山是多馬鮮水出焉而西北流注于涂吾之水又北百七十里曰隄山多馬有獸焉其狀如豹而文首名曰狕水出焉而東流注于泰澤其中多龍龜凡北山經之首自單狐之山至于隄山凡二十五山五千四百九十里其神皆人面蛇身其祠之毛用一雄鷄彘瘞吉玉用一珪瘞而不糈其山北人皆生食不火之物北次二經之首在河之東其首枕汾其名曰管涔之山其上無木而多草其下多玉汾水出焉而西流注于河又北二百五十里曰少陽之山其上多玉其下多赤銀酸水出焉而東流注于汾水其中多美赭又北五十里曰縣雍之山其上多玉其下多銅其獸多閭麋其鳥多白翟白䳑晉水出焉而東南流注于汾水其中多鮆魚其狀如鯈而赤鱗其音如叱食之不驕又北二百里曰狐岐之山無草木多青碧勝水出焉而東北流注于汾水其中多蒼玉又北三百五十里曰白沙山廣員三百里盡沙也無草木鳥獸鮪水出于其上潛于其下是多白玉又北四百里曰爾是之山無草木無水又北三百八十里曰狂山無草木是山也冬夏有雪狂水出焉而西流注于浮水其中多美玉又北三百八十里曰諸餘之山其上多銅玉其下多松柏諸餘之水出焉而東流注于旄水又北三百五十里曰敦頭之山其上多金玉無草木旄水出焉而東流注于邛澤其中多𩣡馬牛尾而白身一角其音如呼又北三百五十里曰鉤吾之山其上多玉其下多銅有獸焉其狀如羊身人面其目在腋下虎齒人爪其音如嬰兒名曰狍鴞是食人又北三百里曰北囂之山無石其陽多碧其陰多玉有獸焉其狀如虎而白身犬首馬尾彘鬣名曰獨𤞞有鳥焉其狀如烏人面名曰𪄀𪃑宵飛而晝伏食之已暍涔水出焉而東流注于邛澤又北三百五十里曰梁渠之山無草木多金玉脩水出焉而東流注于鴈門其獸多居暨其狀如彙而赤毛其音如豚有鳥焉其狀如夸父四翼一目犬尾名曰囂其音如鵲食之已腹痛可以止衕又北四百里曰姑灌之山無草木是山也冬夏有雪又北三百八十里曰湖灌之山其陽多玉其陰多碧多馬湖灌之水出焉而東流注于海其中多䱇有木焉其葉如柳而赤理又北水行五百里流沙三百里至于洹山其上多金玉三桑生之其樹皆無枝其高百仞百果樹生之其下多怪蛇又北三百里曰敦題之山無草木多金玉是錞于北海凡北次二經之首自管涔之山至于敦題之山凡十七山五千六百九十里其神皆蛇身人面其祠毛用一雄雞彘瘞用一璧一珪投而不糈北次三經之首曰太行之山其首曰歸山其上有金玉其下有碧有獸焉其狀如麢羊而四角馬尾而有距其名曰䮝善還其鳴自訆有鳥焉其狀如鵲白身赤尾六足其名曰䴅是善驚其鳴自詨又東北二百里曰龍侯之山無草木多金玉決水出焉而東流注于河其中多人魚其狀如䱱魚四足其音如嬰兒食之無癡疾又東北二百里曰馬成之山其上多文石其陰多金玉有獸焉其狀如白犬而黑頭見人則飛其名曰天馬其鳴自訆有鳥焉其狀如烏首白而身青足黃是名曰鶌鶋其鳴自詨食之不飢可以已寓又東北七十里曰咸山其上有玉其下多銅是多松柏草多茈草條菅之水出焉而西南流注于長澤其中多器酸三歲一成食之已癘又東北二百里曰天池之山其上無草木多文石有獸焉其狀如兔而鼠首以其背飛其名曰飛鼠澠水出焉潛于其下其中多黃堊又東三百里曰陽山其上多玉其下多金銅有獸焉其狀如牛而赤尾其頸𦜜其狀如勾瞿其名曰領胡其鳴自詨食之已狂有鳥焉其狀如雌雉而五彩以文是自為牝牡名曰象蛇其鳴自詨留水出焉而南流注于河其中有䱤父之魚其狀如鮒魚魚首而彘身食之已嘔又東三百五十里曰賁聞之山其上多蒼玉其下多黃堊多涅石又北百里曰王屋之山是多石㶌水出焉而西北流注于泰澤又東北三百里曰教山其上多玉而無石教水出焉西流注于河是水冬乾而夏流實惟乾河其中有兩山是山也廣員三百步其名曰發丸之山其上有金玉又南三百里曰景山南望鹽販之澤北望少澤其上多草藷藇其草多秦椒其陰多赭其陽多玉有鳥焉其狀如蛇而四翼六目三足名曰酸與其鳴自詨見則其邑有恐又東南三百二十里曰孟門之山其上多蒼玉多金其下多黃堊多涅石又東南三百二十里曰平山平水出于其上潛于其下是多美玉又東三百里曰京山有美玉多漆木多竹其陽有赤銅其陰有玄䃤高水出焉南流注于河又東二百里曰虫尾之山其上多金玉其下多竹多青碧丹水出焉南流注于河薄水出焉而東南流注于黃澤又東三百里曰彭毗之山其上無草木多金玉其下多水蚤林之水出焉東南流注于河肥水出焉而南流注于床水其中多肥遺之蛇又東百八十里曰小侯之山明漳之水出焉南流注于黃澤有鳥焉其狀如烏而白文名曰鴣𪄶食之不灂又東三百七十里曰泰頭之山共水出焉南注于虖池其上多金玉其下多竹箭又東北二百里曰軒轅之山其上多銅其下多竹有鳥焉其狀如梟而白首其名曰黃鳥其鳴自詨食之不妬又北二百里曰謁戾之山其上多松柏有金玉沁水出焉南流注于河其東有林焉名曰丹林丹林之水出焉南流注于河嬰侯之水出焉北流注于氾水東三百里曰沮洳之山無草木有金玉濝水出焉南流注于河又北三百里曰神囷之山其上有文石其下有白蛇有飛蟲黃水出焉而東流注于洹滏水出焉而東流注于歐水又北二百里曰發鳩之山其上多柘木有鳥焉其狀如烏文首白喙赤足名曰精衛其鳴自詨是炎帝之少女名曰女娃女娃遊于東海溺而不返故為精衛常銜西山之木石以堙于東海漳水出焉東流注于河又東北百二十里曰少山其上有金玉其下有銅清漳之水出焉東流于濁漳之水又東北二百里曰錫山其上多玉其下有砥牛首之水出焉而東流注于滏水又北二百里曰景山有美玉景水出焉東南流注于海澤又北百里曰題首之山有玉焉多石無水又北百里曰繡山其上有玉青碧其木多栒其草多芍藥芎窮洧水出焉而東流注于河其中有鱯黽又北百二十里曰松山陽水出焉東北流注于河又北百二十里曰敦與之山其上無草木有金玉溹水出于其陽而東流注于泰陸之水泜水出于其陰而東流注于彭水槐水出焉而東流注于泜澤又北百七十里曰柘山其陽有金玉其陰有鐵歷聚之水出焉而北流注于洧水又北三百里曰維龍之山其上有碧玉其陽有金其陰有鐵肥水出焉而東流注于皋澤其中多礨石敞鐵之水出焉而北流注于大澤又北百八十里曰白馬之山其陽多石玉其陰多鐵多赤銅木馬之水出焉而東北流注于虖沱又北二百里曰空桑之山無草木冬夏有雪冬桑之水出焉東流注于虖沱又北三百里曰泰戲之山無草木多金玉有獸焉其狀如羊一角一目目在耳後其名曰䍶䍶其鳴自訆虖沱之水出焉而東流注于漊水液女之水出于其陽南流注于沁水又北三百里曰石山多藏金玉濩濩之水出焉而東流注于虖沱鮮于之水出焉而南流注于虖沱又北二百里曰童戎之山皋涂之水出焉而東流注于漊液水又北三百里曰高是之山滋水出焉而南流注于虖沱其木多椶其草多條滱水出焉東流注于河又北三百里曰陸山多美玉𨜰水出焉而東流注于河又北二百里曰沂山般水出焉而東流注于河北百二十里曰燕山多嬰石燕水出焉東流注于河又北山行五百里水行五百里至于饒山是無草木多瑤碧其獸多橐駝其鳥多鶹歷虢之水出焉而東流注于河其中有師魚食之殺人又北四百里曰乾山無草木其陽有金玉其陰有鐵而無水有獸焉其狀如牛而三足其名曰獂其鳴自詨又北五百里曰倫山倫水出焉而東流注于河有獸焉其狀如麋其州在尾上其名曰羆九又北五百里曰碣石之山繩水出焉而東流注于河其中多蒲夷之魚其上有玉其下多青碧又北水行五百里至于鴈門之山無草木又北水行四百里至于泰澤其中有山焉曰帝都之山廣員百里無草木有金玉又北五百里曰錞于毋逢之山北望雞號之山其風如䬅西望幽都之山浴水出焉是有大蛇赤首白身其音如牛見則其邑大旱凡北次三經之首自太行之山以至于無逢之山凡四十六山萬二千三百五十里其神狀皆馬身而人面者廿神其祠之皆用一藻茝瘞之其十四神狀皆彘身而載玉其祠之皆玉不瘞其十神狀皆彘身而八足蛇尾其祠之皆用一璧瘞之大凡四十四神皆用稌糈米祠之此皆不火食右北經之山志凡八十七山二萬三千二百三十里
