body:
  text: 大荒西經第十六西北海之外大荒之隅有山而不合名曰不周負子有兩黃獸守之有水曰寒暑之水水西有濕山水東有幕山有禹攻共工國山有國名曰淑士顓頊之子有神十人名曰女媧之腸化為神處栗廣之野橫道而處有人名曰石夷來風曰韋處西北隅以司日月之長短有五彩之鳥有冠名曰狂鳥有大澤之長山有白民之國西北海之外赤水之東有長脛之國有西周之國姬姓食穀有人方耕名曰叔均帝俊生后稷稷降以百穀稷之弟曰台璽生叔均叔均是代其父及稷播百穀始作耕有赤國妻氏有雙山西海之外大荒之中有方山者上有青樹名曰匱格之松日月所出入也西北海之外赤水之西有天民之國食穀使四鳥有北狄之國黃帝之孫曰始均始均生北狄有芒山有桂山有榣山其上有人號曰太子長琴顓頊生老童老童生祝融祝融生太子長琴是處榣山始作樂風有五彩鳥三名一曰皇鳥一曰鸞鳥一曰鳳鳥有蟲狀如菟胸以後者裸不見青如猿狀大荒之中有山名曰豐沮玉門日月所入有靈山巫咸巫即巫朌巫彭巫姑巫真巫禮巫抵巫謝巫羅十巫從此升降百藥爰在有西王母之山壑山海山有沃民之國沃民是處沃之野鳳鳥之卵是食甘露是飲凡其所欲其味盡存爰有甘華甘柤白柳視肉三騅璿瑰瑤碧白木琅玕白丹青丹多銀鐵鸞鳥自歌鳳鳥自舞爰有百獸相群是處是謂沃之野有三青鳥赤首黑目一名曰大鵹一名少鵹一名曰青鳥有軒轅之臺射者不敢西嚮畏軒轅之臺大荒之中有龍山日月所入有三澤水名曰三淖昆吾之所食也有人衣青以袂蔽面名曰女丑之尸有女子之國有桃山有虻山有桂山有于土山有丈夫之國有弇州之山五彩之鳥仰天名曰鳴鳥爰有百樂歌儛之風有軒轅之國江山之南棲為吉不壽者乃八百歲西海渚中有神人面鳥身珥兩青蛇踐兩赤蛇名曰弇茲大荒之中有山名曰日月山天樞也吳姖天門日月所入有神人面無臂兩足反屬于頭上名曰噓顓頊生老童老童生重及黎帝令重獻上天令黎抑下地下地是生噎處於西極以行日月星辰之行次有人反臂名曰天虞有女子方浴月帝俊妻常羲生月十有二此始浴之有玄丹之山有五色之鳥人面有髮爰有青鴍黃鷔青鳥黃鳥其所集者其國亡有池名孟翼之攻顓頊之池大荒之中有山名曰鏖鏊巨日月所入者有獸左右有首名曰屏蓬有巫山者有壑山者有金門之山有人名曰黃姖之尸有比翼之鳥有白鳥青翼黃尾玄喙有赤犬名曰天犬其所下者有兵西海之南流沙之濱赤水之後黑水之前有大山名曰崑崙之丘有神人面虎身有文有尾皆白處之其下有弱水之淵環之其外有炎火之山投物輒然有人戴勝虎齒豹尾穴處名曰西王母此山萬物盡有大荒之中有山名曰常陽之山日月所入有寒荒之國有二人女祭女薎有壽麻之國南嶽娶州山女名曰女虔女虔生季格季格生壽麻壽麻正立無景疾呼無響爰有大暑不可以往有人無首操戈盾立名曰夏耕之尸故成湯伐夏桀于章山克之斬耕厥前耕既立無首走厥咎乃降于巫山有人名曰吳回奇左是無右臂有蓋山之國有樹赤皮支幹青葉名曰朱木有一臂民大荒之中有山名曰大荒之山日月所入有人焉三面是顓頊之子三面一臂三面之人不死是謂大荒之野西南海之外赤水之南流沙之西有人珥兩青蛇乘兩龍名曰夏后開開上三嬪于天得九辨與九歌以下此天穆之野高二千仞開焉始得歌九招有氐人之國炎帝之孫名曰靈恝靈恝生互人是能上下于天有魚偏枯名曰魚婦顓頊死即復蘇風道北來天乃大水泉蛇乃化為魚是謂魚婦顓頊死即復蘇有青鳥身黃赤足六首名曰鸀鳥有大巫山有金之山西南大荒之中隅有遍勾常羊之山按夏后開即啓避漢景帝諱云
