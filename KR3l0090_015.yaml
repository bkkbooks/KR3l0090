body:
  text: 大荒南經第十五南海之外赤水之西流沙之東有獸左右有首名曰䟣踢有三青獸相并名曰雙雙有阿山者南海之中有泛天之山赤水窮焉赤水之東有蒼梧之野舜與叔均之所葬也爰有文貝離俞鴟久鷹賈委維熊羆象虎豹狼視肉有滎山滎水出焉黑水之南有玄蛇食麈有巫山者西有黃鳥帝藥八齋黃鳥於巫山司此玄蛇大荒之中有不庭之山榮水窮焉有人三身帝俊妻娥皇生此三身之國姚姓黍食使四鳥有淵四方四隅皆達北屬黑水南屬大荒北旁名曰少和之淵南旁名曰從淵舜之所浴也又有成山甘水窮焉有季禺之國顓頊之子食黍有羽民之國其民皆生毛羽有卵民之國其民皆生卵大荒之中有不薑之山黑水窮焉又有賈山汔水出焉又有言山又有登備之山有恝恝之山又有蒲山澧水出焉又有隗山其西有丹其東有玉又南有山漂水出焉有尾山有翠山有盈民之國於姓黍食又有人方食木葉有不死之國阿姓甘木是食大荒之中有山名曰去痓南極果北不成去痓果南海渚中有神人面珥兩青蛇踐兩赤蛇曰不廷胡余有神名曰因因乎南方曰因乎夸風曰乎民處南極以出入風有襄山又有重陰之山有人食獸曰季釐帝俊生季釐故曰季釐之國有緡淵少昊生倍伐倍伐降處緡淵有水四方名曰俊壇有臷民之國帝舜生無淫無淫降臷處是謂巫臷民巫臷民朌姓食穀不績不經服也不稼不穡食也爰有歌舞之鳥鸞鳥自歌鳳鳥自舞爰有百獸相群爰處百穀所聚大荒之中有山名曰融天海水南入焉有人曰鑿齒羿殺之有蜮山者有蜮民之國桑姓食黍射蜮是食有人方扜弓射黃蛇名曰蜮人有宋山者有赤蛇名曰育蛇有木生山上名曰楓木楓木蚩尤所棄其桎梏是謂楓木有人方齒虎尾名曰祖狀之尸有小人名曰焦僥之國幾姓嘉穀是食大荒之中有山名㱙塗之山青水窮焉有雲雨之山有木名曰欒禹攻雲雨有赤石焉生欒黃本赤枝青葉群帝焉取藥有國曰顓頊生伯服食黍有鼬姓之國有苕山又有宗山又有姓山又有壑山又有陳州山又有東州山又有白水山白水出焉而生白淵昆吾之師所浴也有人名曰張弘在海上捕魚海中有張弘之國食魚使四鳥有人焉鳥喙有翼方捕魚於海大荒之中有人名曰歡頭鯀妻士敬士敬子曰炎融生歡頭歡頭人面鳥喙有翼食海中魚杖翼而行維宜芑苣穋楊是食有歡頭之國帝堯帝嚳帝舜葬於嶽山爰有文貝離俞鴟久鷹賈延維視肉熊羆虎豹朱木赤支青華玄實有申山者大荒之中有山名曰天臺海水入焉東南海之外甘水之間有羲和之國有女子名曰羲和方浴日於甘淵羲和者帝俊之妻是生十日有蓋猶之山者其上有甘柤枝幹皆赤黃葉白華黑實東又有甘華枝幹皆赤黃葉有青馬有赤馬名曰三騅有視肉有小人名曰菌人有南類之山爰有遺玉青馬三騅視肉甘華百穀所在
