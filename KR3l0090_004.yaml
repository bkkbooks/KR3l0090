body:
  text: 東山經第四東山經之首曰樕𧑤之山北臨乾昧食水出焉而東北流注于海其中多鱅鱅之魚其狀如犂牛其音如彘鳴又南三百里曰藟山其上有玉其下有金湖水出焉東流注于食水其中多活師又南三百里曰栒狀之山其上多金玉其下多青碧石有獸焉其狀如犬六足其名曰從從其鳴自詨有鳥焉其狀如雞而鼠毛其名曰䖪鼠見則其邑大旱𣲵水出焉而北流注于湖水其中多針魚其狀如鯈其喙如針食之無疫疾又南三百里曰勃亝之山無草木無水又南三百里曰番條之山無草木多沙減水出焉北流注于海其中多鱤魚又南四百里曰姑兒之山其上多漆其下多桑柘姑兒之水出焉北流注于海其中多鱤魚又南四百里曰高氏之山其上多玉其下多針石諸繩之水出焉東流注于澤其中多金玉又南三百里曰嶽山其上多桑其下多樗濼水出焉東流注于澤其中多金玉又南三百里曰豺山其上無草木其下多水其中多堪㐨之魚有獸焉其狀如夸父而彘毛其音如呼見則天下大水又南三百里曰獨山其上多金玉其下多美石末塗之水出焉而東南流注于沔其中多䖺䗤其狀如黃蛇魚翼出入有光見則其邑大旱又南三百里曰泰山其上多玉其下多金有獸焉其狀如豚而有珠名曰狪狪其名自訆環水出焉東流注于江其中多水玉又南三百里曰竹山錞于江無草木多瑤碧激水出焉而東南流注于娶檀之水其中多茈螺凡東山經之首自樕𧑤之山以至于竹山凡十二山三千六百里其神狀皆人身龍首祠毛用一犬祈䎶用魚東次二經之首曰空桑之山北臨食水東望沮吳南望沙陵西望湣澤有獸焉其狀如牛而虎文其音如欽其名曰軨軨其鳴自叫見則天下大水又南六百里曰曹夕之山其下多榖而無水多鳥獸又西南四百里曰嶧皋之山其上多金玉其下多白堊嶧皋之水出焉東流注于激女之水其中多蜃珧又南水行五百里流沙三百里至于葛山之尾無草木多砥礪又南三百八十里曰葛山之首無草木澧水出焉東流注于余澤其中多珠蟞魚其狀如肺而四目六足有珠其味酸甘食之無癘又南三百八十里曰餘峨之山其上多梓柟其下多荊芑雜余之水出焉東流注于黃水有獸焉其狀如菟而鳥喙鴟目蛇尾見人則眠名曰𤜝狳其鳴自訆見則螽蝗為敗又南三百里曰杜父之山無草木多水又南三百里曰耿山無草木多水碧多大蛇有獸焉其狀如狐而魚翼其名曰朱獳其鳴自叫見則其國有恐又南三百里曰盧其之山無草木多沙石沙水出焉南流注于涔水其中多𪁐鶘其狀如鴛鴦而人足其鳴自訆見則其國多土功又南三百八十里曰姑射之山無草木多水又南水行三百里流沙百里曰北姑射之山無草木多石又南三百里曰南姑射之山無草木多水又南三百里曰碧山無草木多大蛇多碧水玉又南五百里曰緱氏之山無草木多金玉原水出焉東流注于沙澤又南三百里曰姑逢之山無草木多金玉有獸焉其狀如狐而有翼其音如鴻鴈其名曰獙獙見則天下大旱又南五百里曰鳧麗之山其上多金玉其下多針石有獸焉其狀如狐而九尾九首虎爪名曰蠪蛭其音如嬰兒是食人又南五百里曰䃌山南臨䃌水東望湖澤有獸焉其狀如馬而羊目四角牛尾其音如嗥狗其名曰峳峳見則其國多狡客有鳥焉其狀如鳧而鼠尾善登木其名曰潔鉤見則其國多疫凡東次二經之首自空桑之山至于䃌山凡十七山六千六百四十里其神狀皆獸身人面載觡其祠毛用一雞祈嬰用一璧瘞又東次三經之首曰尸胡之山北望𦍲山其上多金玉其下多棘有獸焉其狀如麋而魚目名曰妴胡其鳴自訆又南水行八百里曰岐山其木多桃李其獸多虎又南水行五百里曰諸鉤之山無草木多沙石是山也廣員百里多寐魚又南水行七百里曰中父之山無草木多沙又東水行千里曰胡射之山無草木多沙石又南水行七百里曰孟子之山其木多梓桐多桃李其草多菌蒲其獸多麋鹿是山也廣員百里其上有水出焉名曰碧陽其中多鱣鮪又南水行五百里曰流沙行五百里有山焉曰跂踵之山廣員二百里無草木有大蛇其上多玉有水焉廣員四十里皆涌其名曰深澤其中多蠵龜有魚焉其狀如鯉而六足鳥尾名曰鮯鮯之魚其鳴自叫又南水行九百里曰踇隅之山其上有草木多金玉多赭有獸焉其狀如牛而馬尾名曰精精其鳴自叫又南水行五百里流沙三百里至于無皋之山南望幼海東望榑木無草木多風是山也廣員百里凡東次三經之首自尸胡之山至于無皋之山凡九山六千九百里其神狀皆人身而羊角其祠用一牡羊米用黍是神也見則風雨水為敗又東次四經之首曰北號之山臨于北海有木焉其狀如楊赤華其實如棗而無核其味酸甘食之不瘧食水出焉而東北流注于海有獸焉其狀如狼赤首鼠目其音如豚名曰獦狚是食人有鳥焉其狀如雞而白首鼠足而虎爪其名曰鬿雀亦食人又南三百里曰旄山無草木蒼體之水出焉而西流注于展水其中多鱃魚其狀如鯉而大首食者不疣又南三百二十里曰東始之山上多蒼玉有木焉其狀如楊而赤理其汁如血不實其名曰芑可以服馬泚水出焉而東北流注于海其中多美貝多茈魚其狀如鮒一首而十身其臭如蘪蕪食之不屁又東南三百里曰女蒸之山其上無草木石膏水出焉而西注于鬲水其中多薄魚其狀如鱣魚而一目其音如歐見則天下大旱又東南二百里曰欽山多金玉而無石師水出焉而北流注于皋澤其中多鱃魚多文貝有獸焉其狀如豚而有牙其名曰當康其鳴自叫見則天下大穰又東南二百里曰子桐之山子桐之水出焉而西流注于餘如之澤其中多䱻魚其狀如魚而鳥翼出入有光其音如鴛鴦見則天下大旱又東北二百里曰剡山多金玉有獸焉其狀如彘而人面黃身而赤尾其名曰合窳其音如嬰兒是獸也食人亦食蟲蛇見則天下大水又東二百里曰太山上多金玉楨木有獸焉其狀如牛而白首一目而蛇尾其名曰蜚行水則竭行草則死見則天下大疫鉤水出焉而北流注于勞水其中多鱃魚凡東次四經之首自北號之山至于大山凡八山一千七百二十里右東經之山志凡四十六山萬八千八百六十里
