body:
  text: 南山經第一南山之首曰鵲山其首曰招搖之山臨于西海之上多桂多金玉有草焉其狀如韭而青花其名曰祝餘食之不飢有木焉其狀如榖而黑理其花四照其名曰迷榖佩之不迷有獸焉其狀如禺而白耳伏行人走其名曰狌狌食之善走麗麂之水出焉而西流注于海其中多育沛佩之無瘕疾又東三百里曰堂庭之山多棪木多白猿多水玉多黃金又東三百八十里曰即翼之山其中多怪獸水多怪魚多白玉多蝮蟲多怪蛇多怪木不可以上又東三百七十里曰杻陽之山其陽多赤金其陰多白金有獸焉其狀如馬而白首其文如虎而赤尾其音如謠其名曰鹿蜀佩之宜子孫怪水出焉而東流注于憲翼之水其中多玄龜其狀如龜而鳥首虺尾其名曰旋龜其音如判木佩之不聾可以為底又東三百里曰祗山多水無草木有魚焉其狀如牛陵居蛇尾有翼其羽在魼下其音如留牛其名曰鯥冬死而夏生食之無腫疾又東四百里曰亶爰之山多水無草木不可以上有獸焉其狀如狸而有髦其名曰類自為牝牡食者不妬又東三百里曰基山其陽多玉其陰多怪木有獸焉其狀如羊九尾四耳其目在背其名曰猼訑佩之不畏有鳥焉其狀如雞而三首六目六足三翼其名曰𪁺𩿧食之無臥又東三百里曰青丘之山其陽多玉其陰多青䨼有獸焉其狀如狐而九尾其音如嬰兒能食人食者不蠱有鳥焉其狀如鳩其音若呵名曰灌灌佩之不惑英水出焉南流注于即翼之澤其中多赤鱬其狀如魚而人面其音如鴛鴦食之不疥又東三百五十里曰箕尾之山其尾踆于東海多沙石汸水出焉而南流注于淯其中多白玉凡鵲山之首自招搖之山以至箕尾之山凡十山二千九百五十里其神狀皆鳥身而龍首其祠之禮毛用一璋玉瘞糈用稌米一壁稻米白菅為席南次二經之首曰匱山西臨流黃北望諸毗東望長右英水出焉西南流注于赤水其中多白玉多丹粟有獸焉其狀如豚有距其音如狗吠其名曰狸力見則其縣多土功有鳥焉其狀如鴟而人手其音如痺其名曰鴸其鳴自號也見則其縣多放士東南四百五十里曰長右之山無草木多水有獸焉其狀如禺而四耳其名長右其音如吟見則其郡縣大水又東三百四十里曰堯光之山其陽多玉其陰多金有獸焉其狀如人而彘鬣穴居而冬蟄其名曰猾褱其音如斫木見則縣有大繇又東三百五十里曰羽山其下多水其上多雨無草木多蝮蟲又東三百七十里曰瞿父之山無草木多金玉又東四百里曰句餘之山無草木多金玉又東五百里曰浮玉之山北望具區東望諸毗有獸焉其狀如虎而牛尾其音如吠犬其名曰彘是食人苕水出于其陰北流注于具區其中多鮆魚又東五百里曰成山四方而三壇其上多金玉其下多青䨼𨴯水出焉而南流注于呼勺其中多黃金又東五百里曰會稽之山四方其上多金玉其下多砆石勺水出焉而南流注于湨又東五百里曰夷山無草木多沙石湨水出焉而南流注于列塗又東五百里曰僕勾之山其上多金玉其下多草木無鳥獸無水又東五百里曰咸陰之山無草木無水又東四百里曰洵山其陽多金其陰多玉有獸焉其狀如羊而無口不可殺也其名曰䍺洵水出焉而南流注于閼之澤其中多茈螺又東四百里曰呼勺之山其上多梓柟其下多荊杞滂水出焉而東流注于海又東五百里曰區吳之山無草木多砂石鹿水出焉而南流注于滂水又東五百里曰鹿吳之山上無草木多金石澤更之水出焉而南流注于滂水有獸焉名曰蠱雕其狀如雕而有角其音如嬰兒之音是食人東五百里曰漆吳之山無草木多博石無玉處于海東望丘山其光載出載入是惟日次凡南次二經之首自匱山至于漆吳之山凡十七山七千二百里其神狀皆龍身而鳥首其祠毛用一璧瘞糈用稌南次三經之首曰天虞之山其下多水不可以上東五百里曰禱過之山其上多金玉其下多犀兕多象有鳥焉其狀如鵁而白首三足人面其名曰瞿如其鳴自號也泿水出焉而南流注于海其中有虎蛟其狀魚身而蛇尾其首如鴛鴦食者不腫可以已痔又東五百里曰丹穴之山其上多金玉丹水出焉而南流注于渤海有鳥焉其狀如雞五采而文名曰鳳皇首文曰德翼文曰順背文曰義膺文曰仁腹文曰信是鳥也飲食自然自歌自舞見則天下安寧又東五百里曰發爽之山無草木多水多白猿泛水出焉而南流注于渤海又東四百里至于旄山之尾其南有谷曰育遺多怪鳥凱風自是出又東四百里至于非山之首其上多金玉無水其下多蝮蟲又東五百里曰陽夾之山無草木多水又東五百里曰灌湘之山上多木無草多怪鳥無獸又東五百里曰雞山其上多金其下多丹雘黑水出焉而南流注于海其中有鱄魚其狀如鮒而彘毛其音如豚見則天下大旱又東四百里曰令丘之山無草木多火其南有谷焉曰中谷條風自是出有鳥焉其狀如梟人面四目而有耳其名曰顒其鳴自號也見則天下大旱又東三百七十里曰侖者之山其上多金玉其下多青䨼有木焉其狀如穀而赤理其汗如漆其味如飴食者不飢可以釋勞其名曰白䓘可以血玉又東五百八十里曰禺稿之山多怪獸多大蛇東五百八十里曰南禺之山其上多金玉其下多水有穴焉水春輒入夏乃出冬則閉佐水出焉而東南流注于海有鳳皇鵷雛凡南次三經之首自天虞之山以至南禺之山凡一十四山六千五百三十里其神皆龍身而人面其祠皆一白狗祈糈用稌右南經之山大小凡四十山萬六千三百八十里
