body:
  text: 海內東經第十三海內東北陬以南者巨燕在東北陬國在流沙中者埻端璽㬇在崑崙虛東南一曰海內之郡不為郡縣在流沙中國在流沙外者大夏豎沙居繇月支之國西胡白玉山在大夏東蒼梧在白玉山西南皆在流沙西崑崙虛東南崑崙山在西胡西皆在西北雷澤中有雷神龍身而人頭鼓其腹在吳西都州在海中一曰郁州琅㖿臺在渤海間琅㖿之東其北有山一曰在海間韓鴈在海中都州南始鳩在海中韓鴈南會稽山在大楚南岷三江首大江出汶山北江出曼山南江出高山高山在成都西入海在長州南浙江出三天子都在蠻東在閩西北入海餘暨南廬江出三天子都入江彭澤西一曰天子鄣淮水出餘山餘山在朝陽東義鄉西入海淮浦北湘水出舜葬東南陬西環之入洞庭下一曰東南西澤漢水出鮒魚之山帝顓頊葬于陽九嬪葬于陰四蛇衛之濛水出漢陽西入江聶陽西溫水出崆洞崆洞山在臨汾南入河華陽北潁水出少室少室山在雍氏南入淮西鄢北一曰緱氏汝水出天息山在梁勉鄉西南入淮極西北一曰淮在期思北涇水出長城北山山在郁郅長垣北北入渭戲北渭水出鳥鼠同穴山東注河入華陰北白水出蜀而東南注江入江州城下沅水出象郡鐔城西東注江入下雋西合洞庭中贛水出聶都東山東北注江入彭澤西泗水出魯東北而南西南過湖陵西而東南注東海入淮陰北鬱水出象郡而西南注南海入須陵東南肄水出臨武西南而東南注海入番禺西潢水出桂陽西北山東南注肄水入敦浦西洛水出上洛西山東北注河入成皋之西汾水出上窳北而西南注河入皮氏南沁水出井陘山東東南注河入懷東南濟水出共山南東丘絶巨鹿澤注渤海入齊琅槐東北潦水出衛皋東東南注渤海入潦陽呼沱水出晉陽城南而西至陽曲北而東注渤海入章武北漳水出山陽東東注渤海入章武南建平元年四月丙戌待詔太常屬臣望校治侍中光祿勳臣龔侍中奉車都尉光祿大夫臣秀領主省
