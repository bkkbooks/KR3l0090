body:
  text: 大荒東經第十四東海之外有大壑少昊之國少昊孺帝顓頊於此棄其琴瑟有甘山者甘水出焉生甘淵大荒東南隅有山名皮母地丘東海之外大荒之中有山名曰大言日月所出有波谷山者有大人之國有大人之市名曰大人之堂有一大人踆其上張其兩臂有小人國名靖人有神人面獸身名曰犁𩵀之尸有潏山楊水出焉有蒍國黍食使四鳥虎豹熊羆大荒之中有山名曰合虛日月所出有中容之國帝俊生中容中容人食獸木實使四鳥豹虎熊羆有東口之山有君子之國其人衣冠帶劍有司幽之國帝俊生晏龍晏龍生司幽司幽生思士不妻思女不夫食黍食獸是使四鳥有大阿之山者大荒中有山名曰明星日月所出有白民之國帝俊生帝鴻帝鴻生白民白民銷姓黍食使四鳥虎豹熊羆有青丘之國有狐九尾有柔僕民是維嬴土之國有黑齒之國帝俊生黑齒姜姓黍食使四鳥有夏州之國有蓋余之國有神人八首人面虎身十尾名曰天吳大荒之中有山名曰鞠陵于天東極離瞀日月所出有人名曰折丹東方曰折來風曰俊處東極以出入風東海之渚中有神人面鳥身珥兩黃蛇踐兩黃蛇名曰禺䝞黃帝生禺䝞禺䝞生禺京禺京處北海禺䝞處東海是惟海神有招搖山融水出焉有國曰玄股黍食使四鳥有困民國勾姓而食有人曰王亥兩手操鳥方食其頭王亥託于有易河伯僕牛有易殺王亥取僕牛河伯念有易有易潛出為國於獸方食之名曰搖民帝舜生戲戲生搖民海內有兩人名曰女丑女丑有大蟹大荒之中有山名曰孽搖頵羝上有扶木柱三百里其葉如芥有谷曰溫源谷湯谷上有扶木一日方至一日方出皆載於烏有神人面大耳獸身珥兩青蛇名曰奢比尸有五彩之鳥相鄉棄沙惟帝俊下友帝下兩壇彩鳥是司大荒之中有山名曰猗天蘇門日月所生有塤民之國有綦山又有搖山有䰝山又有門戶山又有盛山又有待山有五彩之鳥東荒之中有山名曰壑明俊疾日月所出有中容之國東北海外又有三青馬三騅甘華爰有遺玉三青鳥三騅視肉甘華甘柤百穀所在有女和月母之國有人名曰𪂧北方曰𪂧來之風曰𤟇是處東極隅以止日月使無相間出沒司其短長大荒東北隅中有山名曰凶犁土丘應龍處南極殺蚩尤與夸父不得復上故下數旱旱而為應龍之狀乃得大雨東海中有流波山入海七千里其上有獸狀如牛蒼身而無角一足出入水則必風雨其光如日月其聲如雷其名曰夔黃帝得之以其皮為鼓橛以雷獸之骨聲聞五百里以威天下
