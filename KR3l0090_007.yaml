body:
  text: 海外西經第七海外自西南陬至西北陬者滅蒙鳥在結匈國北為鳥青赤尾大運山高三百仞在滅蒙鳥北大樂之野夏后啟於此儛九代乘兩龍雲蓋三層左手操翳右手操環佩玉璜在大運山北一曰大遺之野三身國在夏后啟北一首而三身一臂國在其北一臂一目一鼻孔有黃馬虎文一目而一手奇肱之國在其北其人一臂三目有陰有陽乘文馬有鳥焉兩頭赤黃色在其旁形天與帝至此爭神帝斷其首葬之常羊之山乃以乳為目以臍為口操干戚以舞女祭女薎在其北居兩水間薎操角觶祭操俎䳐鳥𪆻鳥其色青黃所經國亡在女祭北䳐鳥人面居山上一曰維鳥青鳥黃鳥所集丈夫國在維鳥北其為人衣冠帶劍女丑之尸生而十日炙殺之在丈夫北以右手鄣其面十日居上女丑居山之上巫咸國在女丑北右手操青蛇左手操赤蛇在登葆山群巫所從上下也并封在巫咸東其狀如彘前後皆有首黑女子國在巫咸北兩女子居水周之一曰居一門中軒轅之國在此窮山之際其不壽者八百歲在女子國北人面蛇身尾交首上窮山在其北不敢西射畏軒轅之丘在軒轅國北其丘方四蛇相繞此諸夭之野鸞鳥自歌鳳鳥自舞鳳皇卵民食之甘露民飲之所欲自從也百獸相與群居在四蛇北其人兩手操卵食之兩鳥居前導之龍魚陵居在其北狀如鯉一曰鰕即有神聖乘此以行九野一曰鱉魚在夭野北其為魚也如鯉白民之國在龍魚北白身被髮有乘黃其狀如狐其背上有角乘之壽二千歲肅慎之國在白民北有樹名曰雄常聖人代立於此取衣長股之國在雄常北被髮一曰長腳西方蓐收左耳有蛇乘兩龍
