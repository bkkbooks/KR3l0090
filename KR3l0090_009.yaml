body:
  text: 海外東經第九海外自東南陬至東北陬者𨲠丘爰有遺玉青馬視肉楊柳甘柤甘華甘果所生在東海兩山夾丘上有樹木一曰嗟丘一曰百果所在在堯葬東大人國在其北為人大坐而削舡一曰在𨲠丘北奢比之尸在其北獸身人面大耳珥兩青蛇一曰肝榆之尸在大人北君子國在其北衣冠帶劍食獸使二文虎在旁其人好讓不爭有薰華草朝生夕死一曰在肝榆之尸北𧈫𧈫在其北各有兩首一曰在君子國北朝陽之谷神曰天吳是為水伯在𧈫𧈫北兩水間其為獸也八首人面八足八尾皆青黃青丘國在其北其人食五穀衣絲帛其狐四足九尾一曰在朝陽北帝命豎亥步自東極至于西極五億十選九千八百八十步豎亥右手把算左手指青丘北一曰禹令豎亥一曰五億十萬九千八百步黑齒國在其北為人黑齒食稻啖蛇一赤一青在其旁一曰在豎亥北為人黑手食稻使蛇其一蛇赤下有湯谷湯谷上有扶木十日所浴在黑齒北居水中有大木九日居下枝一日居上枝雨師妾在其北其為人黑兩手各操一蛇左耳有青蛇右耳有赤蛇一曰在十日北為人黑身人面各操一龜玄股之國在其北其為人衣魚食䳼使兩鳥夾之一曰在雨師妾北毛民之國在其北為人身生毛一曰在玄股北勞民國在其北其為人黑或曰教民一曰在毛民北為人面目手足盡黑東方勾芒鳥身人面乘兩龍建平元年四月丙戌待詔太常屬臣望校治侍中光祿勳臣龔侍中奉車都尉光祿大夫臣秀領主省
