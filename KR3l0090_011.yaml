body:
  text: 海內西經第十一海內西南陬以北者貳負之臣曰危危與貳負殺窫窳帝乃梏之䟽屬之山桎其右足反縛兩手與髮繫之山上木在開題西北大澤方百里群鳥所生及所解在鴈門北鴈門山鴈出其間在高柳北高柳在代北后稷之葬山水環之在氐國西流黃酆氏之國中方三百里有塗四方中有山在后稷葬西流沙出鍾山西行又南行崑崙之虛西南入海黑水之山東胡在大澤東夷人在東胡東貊國在漢水東北地近于燕滅之孟鳥在貊國東北其鳥文赤黃青東鄉海內崑崙之虛在西北帝之下都崑崙之虛方八百里高萬仞上有木禾長五尋大五圍面有九井以玉為檻面有九門門有開明獸守之百神之所在在八隅之巖赤水之際非仁羿莫能上岡之巖赤水出東南隅以行其東北西南流注南海厭火東河水出東北隅以行其北西南又入渤海又出海外即西而北入禹所導積石山洋水黑水出西北隅以東東行又東北南入海羽民南弱水青水出西南隅以東又北又西南過畢方鳥東崑崙南淵深三百仞開明獸身大類虎而九首皆人面東嚮立崑崙上開明西有鳳凰鸞鳥皆戴蛇踐蛇膺有赤蛇開明北有視肉珠樹文玉樹玗琪樹不死樹鳳凰鸞鳥皆載瞂又有離朱木禾柏樹甘水聖木曼兌一曰挺木牙交開明東有巫彭巫抵巫陽巫履巫凡巫相夾窫窳之尸皆操不死之藥以距之窫窳者蛇身人面貳負臣所殺也服常樹其上有三頭人伺琅玕樹開明南有樹鳥六首蛟蝮蛇蜼豹鳥秩樹於表池樹木誦鳥鶽視肉
