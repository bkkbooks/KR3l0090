  - {type: variant, offset: 349, length: 0, content: '', WYG: 莊周云昔者十日並出草木焦枯淮南子亦云堯乃令羿射十日中其九日日中烏盡死離騷所謂羿焉畢日烏焉落羽者也歸藏鄭母經云昔者羿善射畢十日果畢之汲郡竹書曰𦙍甲即位居西河有妖孽十日並出明此自然之異有自來矣傳曰天有十日日之數十此云九日居下枝一日居上枝大荒經又云一日方至一日方出明天地雖有十日自使以次第迭出運照而今俱見為天下妖災故羿稟堯之命洞其靈誠仰天控弦而九日潛退也假令器用可以激水烈火精盛可以降霜囘景然則羿之鑠明離而斃陽烏未足為難也若搜之常情則無理矣然推之以數則無徃不通逹觀之客宜領其𤣥致歸之𡨕會則逸義無滯言竒不廢矣}
