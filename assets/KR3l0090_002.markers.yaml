  - {type: variant, offset: 3038, length: 0, content: '', WYG: 主知災厲五刑殘殺之氣也穆天子傳曰吉日甲子天子賓于西王母執𤣥圭白璧以見西王母獻錦組百縷金玉百斤西王母再拜受之乙丑天子觴西王母于瑶池之上西王母為天子謡曰白雲在天山陵自出道里悠逺山川間之將子無死尚復能來天子畣之曰予還東土和理諸夏萬民均平吾顧見汝比及三年將復而野西王母又為天子吟曰徂彼西土爰居其所虎豹為羣鳥鵲與處嘉命不遷我惟帝女彼何世民又將去子吹笙鼓簧中心翺翔世民之子惟天之望天子遂驅升于奄山乃紀迹于奄山之石而樹之槐眉曰西王母之山奄山即崦嵫山也案竹書穆王五十七年西王母來見賔于昭宫舜時西王母遣使獻玉環見禮三朝}
