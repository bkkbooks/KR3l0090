  - {type: 'tls:seg', offset: 81, content: '', id: KR3l0090_tls_014-4a.4}
  - {type: variant, offset: 81, length: 0, content: '', WYG: 晋永嘉二年有鷔鳥集于始安縣南廿里之鷔陂中民周虎張得之木矢貫之鐵鏃其長六尺有半以箭計之其射者人身應長一丈五六尺也又平州别駕髙㑹語云倭國人嘗行遭風吹度大海外見一國人皆長丈餘形狀似胡盖是長翟别種箭殆將從此國来也外傳曰焦僥人長三尺短之至也長者不過十丈數之極也按河圖玉版曰從崑崙以北九萬里得龍伯國人長三十丈生萬八千歳而死從崑崙以東得大秦人長十丈皆衣帛從此以東十萬里得佻人國長三十丈五尺從此以東十萬里得中秦國人長一丈穀梁傳曰長翟身横九畝載其頭眉見於軾即長數丈人也秦時大人見臨洮身長五丈脚跡六尺凖斯以言則此大人之長短未可得限度也}
