  - {type: punctuation, offset: 7947, content: ，, id: KR3l0090_tls_005-bkkpn1750}
  - {type: 'tls:seg', offset: 7947, content: '', id: KR3l0090_tls_005-200a.9}
  - {type: variant, offset: 7947, length: 0, content: '', WYG: 天帝之二女而處江為神即列仙傳江妃二女也離騷九歌所謂湘夫人稱帝子者是也而河圗玉版曰湘夫人者帝堯女也秦始皇浮江至湘山逢大風而問博士湘君何神博士曰聞之堯二女舜妃也死而葬此列女傳曰二女死于江湘之間俗謂為湘君鄭司農亦以舜妃為湘君說者皆以舜陟方而死二妃從之俱溺死於湘江遂號為湘夫人按九歌湘君湘夫人自是二神江湘之有夫人猶河洛之有虙妃也此之為靈與天地並矣安得謂之堯女且既謂之堯女安得復總云湘君哉何以考之禮記曰舜葬蒼梧二妃不從明二妃生不從征死不從葬義可知矣即令從之二女靈達鑒通無方尚能以鳥工龍裳救井廪之難豈尚不能自免于風波而有雙淪之患乎假復如此傳曰生為上公死為貴神禮五嶽比三公四瀆比諸侯令湘川不及四瀆無秩於命祀而二女帝者之后配靈神祇無緣當復下降小水而為夫人也參互其義義既混錯錯綜其理理無可據斯不然矣原其致謬之由由乎俱以帝女為名名實相亂莫矯其失習非勝是終古不悟可悲矣}
