  - {type: variant, offset: 7962, length: 0, content: '', WYG: 此言二女遊戲江之淵府則能鼔三江令風波之氣共相交通言其靈響之意也江湘沅水皆共㑹巴陵頭故號為三江之口澧又去之七八十里而入江焉淮南子曰弋釣瀟湘今所在未詳也瀟音消}
