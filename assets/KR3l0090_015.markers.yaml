  - {type: variant, offset: 901, length: 0, content: '', WYG: 羲和盖天地始生主日月者也故啟筮曰空桑之蒼蒼八極之既張乃有夫羲和是主日月職出入以為晦明又曰瞻彼上天一明一晦有夫羲和之子出於暘谷故堯因此而立羲和之官以主四時其後世遂為此國作日月之𧰼而掌之沐浴運轉之於甘水中以効其出入𤾉谷虞淵也所謂世不失職耳}
