  - {type: variant, offset: 56, length: 0, content: '', WYG: 漢宣帝使人上郡發盤石石室中得一人蹝裸被髪反縛械一足以問羣臣莫能知劉子政按此言對之宣帝大驚於是時人爭學山海經矣論者多以為是其尸象非真體也意者以靈怪變化論難以理測物禀異氣出于不然不可以常運推不可以近數揆矣魏時有人發故周王冢者得殉女子不死不生數日時有氣數月而能語狀如廿許人送詣京師郭太后愛養之恒在左右十餘年太后崩此女哀思哭泣一年餘而死即此𩔖也}
