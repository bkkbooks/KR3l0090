body:
  text: 海外南經第六地之所載六合之間四海之內照之以日月經之以星辰紀之以四時要之以太歲神靈所生其物異形或夭或壽唯聖人能通其道海外自西南陬至東南陬者結匈國在其西南其為人結匈南山在其東南自此山來蟲為蛇蛇號為魚一曰南山在結匈東南比翼鳥在其東其為鳥青赤兩鳥比翼一曰在南山東羽民國在其東南其為人長頭身生羽一曰在比翼鳥東南其為人長頰有神人二八連臂為帝司夜於此野在羽民東其為人小頰赤肩盡十六人畢方鳥在其東青水西其為鳥人面一腳一曰在二八神東讙頭國在其南其為人人面有翼鳥喙方捕魚一曰在畢方東或曰讙朱國厭火國在其南其為人獸身黑色火出其口中一曰在讙朱東三株樹在厭火北生赤水上其為樹如柏葉皆為珠一曰其為樹若彗三苗國在赤水東其為人相隨一曰三毛國臷國在其東其為人黃能操弓射蛇一曰臷國在三毛東貫匈國在其東其為人匈有竅一曰在臷國東交脛國在其東其為人交脛一曰在穿匈東不死民在其東其為人黑色壽考不死一曰在穿匈國東岐舌國在其東一曰在不死民東崑崙虛在其東虛四方一曰在岐舌東為虛四方羿與鑿齒戰於壽華之野羿射殺之在崑崙虛東羿持弓矢鑿齒持戟盾一曰戈三首國在其東其為人一身三首一曰在鑿齒東周饒國在其東其為人短小冠帶一曰焦僥國在三首東長臂國在其東捕魚水中兩手各操一魚一曰在焦僥東捕魚海中狄山帝堯葬于陽帝嚳葬于陰爰有熊羆文虎蜼豹離朱視肉吁咽文王皆葬其所一曰湯山一曰爰有熊羆文虎蜼豹離朱鴟久視肉虖交有范林方三百里南方祝融獸身人面乘兩龍
